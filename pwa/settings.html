<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งค่าระบบ — ระบบประปาหมู่บ้าน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Serif+Thai:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="layout.css">
<style>
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.sec-card{background:white;border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.sec-card-header{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px}
.sec-card-title{font-size:14px;font-weight:700;color:var(--gray-800)}
.sec-card-body{padding:18px 20px;display:grid;gap:14px}

.staff-list{display:grid;gap:8px}
.staff-item{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:14px}
.staff-item.inactive{opacity:.6}
.staff-name{font-weight:600;color:var(--gray-800)}
.staff-role{font-size:12px;color:var(--gray-500)}

.backup-day-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.backup-day-row label{font-size:13px;font-weight:600;color:var(--gray-600);white-space:nowrap}
.backup-day-row select{height:38px;padding:0 10px;border:1.5px solid var(--gray-200);border-radius:var(--r);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:all .18s}
.backup-day-row select:focus{border-color:var(--blue)}

.last-backup{font-size:13px;color:var(--gray-500)}
.last-backup .ok{color:var(--green);font-weight:600}
.last-backup .warn{color:var(--amber);font-weight:600}

/* Modal เพิ่มเจ้าหน้าที่ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,37,64,.55);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:var(--r-lg);width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--gray-800)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--gray-400);padding:4px;border-radius:6px}
.modal-close svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;display:block}
.modal-body{padding:16px 20px;display:grid;gap:12px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}

@media(max-width:768px){.settings-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="main">
  <header class="topbar">
    <div class="topbar-title">ตั้งค่าระบบ</div>
    <div class="topbar-date" id="topbarDate"></div>
  </header>
  <div class="content">
    <div class="settings-grid">

      <!-- อัตราค่าน้ำ -->
      <div class="sec-card">
        <div class="sec-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <div class="sec-card-title">อัตราค่าน้ำ</div>
        </div>
        <div class="sec-card-body">
          <div class="form-group">
            <label>ราคาต่อหน่วย (บาท/ลูกบาศก์เมตร)</label>
            <input type="number" id="cfgRate" min="1" step="0.5" placeholder="7">
          </div>
          <div class="form-group">
            <label>ค่ารักษามิเตอร์ (บาท/เดือน)</label>
            <input type="number" id="cfgMaintFee" min="0" step="1" placeholder="0">
          </div>
          <div class="form-group">
            <label>เลขเล่มใบเสร็จปัจจุบัน</label>
            <input type="text" id="cfgBook" placeholder="001">
            <div class="form-hint">เปลี่ยนเมื่อขึ้นเล่มใหม่</div>
          </div>
          <button class="btn btn-primary" onclick="saveRates()" id="btnRate">
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
            บันทึกอัตราค่าน้ำ
          </button>
        </div>
      </div>

      <!-- Backup -->
      <div class="sec-card">
        <div class="sec-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div class="sec-card-title">สำรองข้อมูล (Backup)</div>
        </div>
        <div class="sec-card-body">
          <div class="backup-day-row">
            <label>Backup อัตโนมัติวันที่</label>
            <select id="cfgBackupDay">
              <option value="1">1 (ต้นเดือน)</option>
              <option value="5">5</option>
              <option value="15">15 (กลางเดือน)</option>
              <option value="28">28</option>
            </select>
            <label>ของทุกเดือน</label>
          </div>
          <div class="last-backup" id="lastBackupLabel">Backup ล่าสุด: กำลังโหลด...</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="doBackup()" id="btnBackup" style="flex:1">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Backup ตอนนี้เลย
            </button>
            <button class="btn btn-outline" onclick="saveBackupDay()" id="btnBackupDay">
              บันทึกวัน
            </button>
          </div>
        </div>
      </div>

      <!-- เจ้าหน้าที่ -->
      <div class="sec-card" style="grid-column:1/-1">
        <div class="sec-card-header" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <div class="sec-card-title">เจ้าหน้าที่ (ผู้เก็บเงิน / เหรัญญิก)</div>
          </div>
          <button class="btn btn-primary" onclick="openStaffModal()" style="padding:6px 14px;font-size:13px">
            + เพิ่มเจ้าหน้าที่
          </button>
        </div>
        <div class="sec-card-body">
          <div style="font-size:13px;color:var(--gray-500);background:var(--blue-pale);padding:10px 12px;border-radius:var(--r)">
            ชื่อเจ้าหน้าที่จะปรากฏในใบเสร็จ · สามารถมีได้หลายคน · เปลี่ยนสถานะได้ตลอดเวลา · ระบบจำไว้ว่าปีก่อนใครเป็นใคร
          </div>
          <div class="staff-list" id="staffList">
            <div style="text-align:center;padding:20px;color:var(--gray-400)">กำลังโหลด...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal เพิ่มเจ้าหน้าที่ -->
<div class="modal-overlay" id="staffModal" onclick="if(event.target===this)closeStaffModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">เพิ่มเจ้าหน้าที่</div>
      <button class="modal-close" onclick="closeStaffModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>ชื่อ-นามสกุล <span class="req">*</span></label>
        <input type="text" id="sName" placeholder="เช่น นายสมชาย ใจดี">
      </div>
      <div class="form-group">
        <label>ตำแหน่ง <span class="req">*</span></label>
        <select id="sRole">
          <option value="collector">ผู้เก็บเงิน</option>
          <option value="treasurer">เหรัญญิก</option>
        </select>
      </div>
      <div class="form-group">
        <label>วันที่เริ่มทำหน้าที่</label>
        <input type="date" id="sStartDate">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeStaffModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="btnStaffSave" onclick="saveStaff()">บันทึก</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="sidebar.js"></script>
<script>
let staffList = [], cfgData = {};

document.addEventListener('DOMContentLoaded', async () => {
  if (!initPage('settings')) return;
  document.getElementById('sStartDate').value = new Date().toISOString().slice(0, 10);
  await loadSettings();
});

async function loadSettings() {
  try {
    const r = await apiAuth('getSettings');
    if (!r.ok) return;
    cfgData   = r.data?.config || {};
    staffList = r.data?.staff  || [];

    document.getElementById('cfgRate').value       = cfgData.rate_per_unit  || 7;
    document.getElementById('cfgMaintFee').value   = cfgData.maintenance_fee || 0;
    document.getElementById('cfgBook').value       = cfgData.invoice_book   || '001';
    document.getElementById('cfgBackupDay').value  = cfgData.backup_day     || '1';

    // Last backup
    const lb = cfgData.last_backup_date;
    const lbEl = document.getElementById('lastBackupLabel');
    if (lb) {
      const days = Math.floor((new Date() - new Date(lb)) / 86400000);
      lbEl.innerHTML = `Backup ล่าสุด: <span class="${days > 10 ? 'warn' : 'ok'}">${fmtDate(lb)}</span>`;
    } else {
      lbEl.innerHTML = 'Backup ล่าสุด: <span class="warn">ยังไม่เคย Backup</span>';
    }

    renderStaff();
  } catch(e) { toast('err', 'โหลดการตั้งค่าไม่ได้: ' + e.message); }
}

function renderStaff() {
  const el = document.getElementById('staffList');
  if (!staffList.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">ยังไม่มีเจ้าหน้าที่</div>';
    return;
  }
  const roleTh = { collector: 'ผู้เก็บเงิน', treasurer: 'เหรัญญิก' };
  el.innerHTML = staffList.map(s => `
    <div class="staff-item ${s.status !== 'active' ? 'inactive' : ''}">
      <div>
        <div class="staff-name">${s.full_name}</div>
        <div class="staff-role">${roleTh[s.role_type] || s.role_type} · เริ่ม ${fmtDate(s.effective_date)}</div>
      </div>
      <span class="tag ${s.status === 'active' ? 'tag-active' : 'tag-inactive'}">${s.status === 'active' ? 'ใช้งาน' : 'ยกเลิก'}</span>
      <button onclick="toggleStaff('${s.staff_id}','${s.status}')"
        style="padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);color:var(--gray-500);background:white;font-family:'Sarabun',sans-serif;white-space:nowrap">
        ${s.status === 'active' ? 'ยกเลิก' : 'เปิดใช้'}
      </button>
    </div>`).join('');
}

async function saveRates() {
  const btn = document.getElementById('btnRate');
  setLoading(btn, true);
  try {
    await Promise.all([
      apiAuth('saveSettings', { key: 'rate_per_unit',   value: document.getElementById('cfgRate').value }),
      apiAuth('saveSettings', { key: 'maintenance_fee', value: document.getElementById('cfgMaintFee').value }),
      apiAuth('saveSettings', { key: 'invoice_book',    value: document.getElementById('cfgBook').value }),
    ]);
    toast('ok', '✓ บันทึกอัตราค่าน้ำแล้ว');
  } catch(e) { toast('err', 'บันทึกไม่ได้: ' + e.message); }
  setLoading(btn, false);
}

async function saveBackupDay() {
  const btn = document.getElementById('btnBackupDay');
  setLoading(btn, true, 'กำลังบันทึก...');
  try {
    await apiAuth('saveSettings', { key: 'backup_day', value: document.getElementById('cfgBackupDay').value });
    toast('ok', '✓ บันทึกวัน Backup แล้ว');
  } catch(e) { toast('err', 'บันทึกไม่ได้: ' + e.message); }
  setLoading(btn, false);
}

async function doBackup() {
  if (!confirm('ต้องการ Backup ข้อมูลไปยัง Google Drive ตอนนี้ใช่ไหม?')) return;
  const btn = document.getElementById('btnBackup');
  setLoading(btn, true, 'กำลัง Backup...');
  try {
    const r = await apiAuth('backup');
    if (r.ok) { toast('ok', '✓ Backup สำเร็จ!'); await loadSettings(); }
    else toast('err', 'Backup ล้มเหลว: ' + (r.message || r.reason));
  } catch(e) { toast('err', 'Backup ไม่ได้: ' + e.message); }
  setLoading(btn, false);
}

function openStaffModal() {
  document.getElementById('sName').value = '';
  document.getElementById('sRole').value = 'collector';
  document.getElementById('sStartDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('staffModal').classList.add('show');
  setTimeout(() => document.getElementById('sName').focus(), 100);
}
function closeStaffModal() { document.getElementById('staffModal').classList.remove('show'); }

async function saveStaff() {
  const name = document.getElementById('sName').value.trim();
  if (!name) { toast('err', 'กรุณากรอกชื่อ-นามสกุล'); return; }
  const btn = document.getElementById('btnStaffSave');
  setLoading(btn, true);
  try {
    const r = await apiAuth('saveStaff', {
      staff: {
        full_name:      name,
        role_type:      document.getElementById('sRole').value,
        effective_date: document.getElementById('sStartDate').value,
        status:         'active',
      }
    });
    if (r.ok) {
      toast('ok', '✓ เพิ่มเจ้าหน้าที่แล้ว');
      closeStaffModal();
      await loadSettings();
    } else toast('err', r.message || 'เกิดข้อผิดพลาด');
  } catch(e) { toast('err', e.message); }
  setLoading(btn, false);
}

async function toggleStaff(staffId, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
  if (!confirm(newStatus === 'inactive' ? 'ยกเลิกเจ้าหน้าที่คนนี้?' : 'เปิดใช้งานอีกครั้ง?')) return;
  const s = staffList.find(x => x.staff_id === staffId);
  if (!s) return;
  try {
    await apiAuth('saveStaff', { staff: { ...s, status: newStatus } });
    toast('ok', '✓ อัปเดตสถานะแล้ว');
    await loadSettings();
  } catch(e) { toast('err', e.message); }
}
</script>
</body>
</html>
