<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประปาหมู่บ้าน — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Serif+Thai:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#2d7dd2; --blue-dark:#0a2540; --blue-pale:#e8f4fd;
  --teal:#0d9488; --green:#059669; --red:#dc2626;
  --gray-50:#f8fafc; --gray-200:#e2e8f0; --gray-400:#94a3b8;
  --gray-600:#475569; --gray-800:#1e293b;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family:'Sarabun',sans-serif;
  background:var(--blue-dark);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; overflow:hidden; position:relative;
}

/* พื้นหลังเคลื่อนไหว */
.bg { position:fixed; inset:0; z-index:0; overflow:hidden }
.bg-circle {
  position:absolute; border-radius:50%;
  background:rgba(45,125,210,.06);
  animation:float linear infinite;
}
@keyframes float {
  0%   { transform:translateY(110vh) scale(0); opacity:0 }
  10%  { opacity:1 }
  90%  { opacity:.3 }
  100% { transform:translateY(-20vh) scale(1); opacity:0 }
}

/* Card */
.wrap { position:relative; z-index:1; width:100%; max-width:420px; animation:slideUp .5s cubic-bezier(.16,1,.3,1) }
@keyframes slideUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }

.logo { text-align:center; margin-bottom:24px }
.logo-icon {
  width:68px; height:68px; border-radius:50%; margin:0 auto 12px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 32px rgba(45,125,210,.4), 0 0 0 10px rgba(45,125,210,.1);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow:0 8px 32px rgba(45,125,210,.4), 0 0 0 10px rgba(45,125,210,.1) }
  50%      { box-shadow:0 8px 32px rgba(45,125,210,.5), 0 0 0 16px rgba(45,125,210,.05) }
}
.logo-icon svg { width:32px; height:32px; fill:white }
.logo h1 { font-family:'Noto Serif Thai',serif; font-size:21px; font-weight:700; color:white; line-height:1.4 }
.logo p  { font-size:13px; color:rgba(255,255,255,.5); margin-top:4px }

.card {
  background:rgba(255,255,255,.97);
  border-radius:20px; padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.msg {
  display:none; padding:12px 14px; border-radius:8px;
  font-size:14px; font-weight:500; margin-bottom:16px;
  align-items:center; gap:8px;
}
.msg.error   { display:flex; background:#fef2f2; color:var(--red);   border:1px solid #fecaca }
.msg.loading { display:flex; background:var(--blue-pale); color:#1e40af; border:1px solid #bfdbfe }
.msg.success { display:flex; background:#f0fdf4; color:var(--green); border:1px solid #bbf7d0 }

.field { margin-bottom:16px }
.field label { display:block; font-size:14px; font-weight:600; color:var(--gray-800); margin-bottom:6px }
.input-wrap { position:relative }
.input-wrap .icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--gray-400); pointer-events:none; transition:color .2s;
}
.input-wrap:focus-within .icon { color:var(--blue) }
.input-wrap input {
  width:100%; height:50px; padding:0 14px 0 42px;
  font-family:'Sarabun',sans-serif; font-size:16px; font-weight:500;
  color:var(--gray-800); background:var(--gray-50);
  border:2px solid var(--gray-200); border-radius:8px;
  outline:none; transition:all .2s;
}
.input-wrap input:focus {
  background:white; border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(45,125,210,.1);
}
.input-wrap input::placeholder { color:var(--gray-400); font-weight:400 }
.toggle-eye {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  color:var(--gray-400); padding:4px; transition:color .2s;
}
.toggle-eye:hover { color:var(--blue) }

.btn-login {
  width:100%; height:52px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  color:white; font-family:'Sarabun',sans-serif;
  font-size:17px; font-weight:700; letter-spacing:.3px;
  border:none; border-radius:8px; cursor:pointer;
  transition:all .2s; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(45,125,210,.4);
}
.btn-login:hover:not(:disabled) {
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(45,125,210,.5);
}
.btn-login:disabled { opacity:.7; cursor:not-allowed; transform:none }

.footer { text-align:center; margin-top:18px; font-size:12px; color:rgba(255,255,255,.4) }
.footer a { color:rgba(255,255,255,.6); text-decoration:none }
.footer a:hover { color:white }

@keyframes spin { to { transform:rotate(360deg) } }
.spin { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite }
</style>
</head>
<body>
<div class="bg" id="bg"></div>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 8 5 12 5 16a7 7 0 0 0 14 0c0-4-3-8-7-14z" opacity=".35"/><path d="M12 6c-2.5 4-4 7-4 10a4 4 0 0 0 8 0c0-3-1.5-6-4-10z"/></svg>
    </div>
    <h1>ระบบบริหารจัดการ<br>ประปาหมู่บ้าน</h1>
    <p>กรุณาเข้าสู่ระบบด้วยบัญชีของท่าน</p>
  </div>

  <div class="card">
    <div class="msg" id="msg">
      <span id="msgIcon"></span>
      <span id="msgText"></span>
    </div>

    <div class="field">
      <label for="username">ชื่อผู้ใช้งาน</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input id="username" type="text" placeholder="กรอกชื่อผู้ใช้งาน" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
    </div>

    <div class="field">
      <label for="password">รหัสผ่าน</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="password" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
        <button class="toggle-eye" type="button" onclick="toggleEye()" title="แสดง/ซ่อน">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <span id="btnContent">เข้าสู่ระบบ</span>
    </button>
  </div>

  <div class="footer">
    มีปัญหาการเข้าใช้งาน? <a href="tel:">ติดต่อผู้ดูแลระบบ</a>
  </div>
</div>

<script src="config.js"></script>
<script>
// สร้าง particles
(function() {
  const bg = document.getElementById('bg');
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'bg-circle';
    const s = Math.random() * 60 + 20;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-delay:${Math.random()*12}s;animation-duration:${Math.random()*10+8}s`;
    bg.appendChild(p);
  }
})();

// ถ้า login อยู่แล้วให้ไปหน้าหลักเลย
if (Auth.token()) {
  window.location.href = Auth.user().role === 'superadmin' ? 'superadmin.html' : 'dashboard.html';
}

let eyeVisible = false;
function toggleEye() {
  eyeVisible = !eyeVisible;
  document.getElementById('password').type = eyeVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = eyeVisible
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  document.getElementById('msgIcon').textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : '⏳';
  document.getElementById('msgText').textContent = text;
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username) { showMsg('error', 'กรุณากรอกชื่อผู้ใช้งาน'); return; }
  if (!password)  { showMsg('error', 'กรุณากรอกรหัสผ่าน');   return; }

  const btn = document.getElementById('btnLogin');
  const content = document.getElementById('btnContent');
  btn.disabled = true;
  content.innerHTML = '<span class="spin"></span> กำลังตรวจสอบ...';
  showMsg('loading', 'กำลังเข้าสู่ระบบ กรุณารอสักครู่...');

  try {
    const data = await api('login', { username, password });

    if (data.ok) {
      Auth.save(data.token, data.user);
      showMsg('success', `ยินดีต้อนรับ ${data.user.full_name || username}`);
      setTimeout(() => {
        window.location.href = data.user.role === 'superadmin' ? 'superadmin.html' : 'dashboard.html';
      }, 700);
    } else {
      const msgs = {
        wrong_password:    'รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่',
        user_not_found:    'ไม่พบชื่อผู้ใช้งานในระบบ',
        account_suspended: 'บัญชีถูกระงับ กรุณาติดต่อผู้ดูแล',
        village_suspended: 'ระบบหมู่บ้านถูกระงับชั่วคราว',
        missing_fields:    'กรุณากรอกข้อมูลให้ครบ',
      };
      showMsg('error', msgs[data.reason] || 'เกิดข้อผิดพลาด: ' + data.reason);
      btn.disabled = false;
      content.textContent = 'เข้าสู่ระบบ';
    }
  } catch (err) {
    showMsg('error', 'ไม่สามารถเชื่อมต่อได้: ' + err.message);
    btn.disabled = false;
    content.textContent = 'เข้าสู่ระบบ';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
