<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พิมพ์แบบฟอร์ม — ระบบประปาหมู่บ้าน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Serif+Thai:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="layout.css">
<style>
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.type-btn{padding:16px;border:2px solid var(--gray-200);border-radius:var(--r-lg);cursor:pointer;background:white;text-align:center;transition:all .18s;font-family:'Sarabun',sans-serif}
.type-btn:hover{border-color:var(--blue);background:var(--blue-pale)}
.type-btn.active{border-color:var(--blue);background:var(--blue-pale)}
.type-btn .icon{font-size:26px;margin-bottom:6px}
.type-btn .name{font-size:14px;font-weight:700;color:var(--gray-800)}
.type-btn .desc{font-size:11px;color:var(--gray-400);margin-top:2px}

.preview-wrap{background:white;border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden}

/* ── Print styles ─────────────────────────────────────────── */
@media print {
  body > .main { display:none }
  .print-area  { display:block !important }
  @page { size:A4; margin:12mm 10mm }
}
@media screen {
  .print-area { padding:20px; background:white }
}

/* Meter book */
.mb-header { text-align:center; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid #333 }
.mb-title   { font-size:15px; font-weight:700 }
.mb-sub     { font-size:13px; margin-top:2px }
.mb-period  { font-size:13px; margin-top:6px }
.mb-fill    { display:inline-block; min-width:80px; border-bottom:1px solid #333 }
.mb-table   { width:100%; border-collapse:collapse; font-size:12px }
.mb-table th,.mb-table td { border:1px solid #666; padding:4px 7px; text-align:center }
.mb-table th  { background:#f0f0f0; font-weight:700 }
.mb-table .name-col { text-align:left; min-width:150px }

/* ABT form */
.abt-title  { font-size:17px; font-weight:700; text-align:center }
.abt-sub    { font-size:13px; text-align:center; margin-top:3px }
.abt-table  { width:100%; border-collapse:collapse; font-size:12px; margin-top:14px }
.abt-table th,.abt-table td { border:1px solid #666; padding:4px 7px }
.abt-table th { background:#e8e8e8; font-weight:700; text-align:center }
.abt-table .name-col { text-align:left; min-width:120px }
.abt-total { font-weight:700; background:#f5f5f5 }
.abt-summary { margin-top:16px; border:1px solid #999; padding:12px; font-size:13px }
.abt-sum-row { display:flex; justify-content:space-between; padding:2px 0 }

/* All receipts */
.r-single { border:1px solid #ccc; padding:14px; margin-bottom:4mm; font-size:12px; page-break-after:always }
.r-single:last-child { page-break-after:avoid }
.r-head   { text-align:center; margin-bottom:10px }
.r-org    { font-size:14px; font-weight:700 }
.r-row    { display:flex; justify-content:space-between; padding:2px 0 }
.r-row .lbl { color:#555 }
.r-row .val { font-weight:600 }
.r-total  { display:flex; justify-content:space-between; font-size:14px; font-weight:700; border-top:2px solid #333; margin-top:6px; padding-top:5px }
.r-sign   { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:14px; text-align:center; font-size:11px; color:#555 }
.r-sign-line { border-top:1px solid #888; padding-top:3px; margin-top:22px }
.r-dashed { border:none; border-top:1px dashed #ccc; margin:8px 0 }
.sign-area { display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:28px; text-align:center; font-size:12px }
.sign-line { border-top:1px solid #555; padding-top:4px; margin-top:32px }

@media(max-width:640px){.type-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="main">
  <header class="topbar">
    <div class="topbar-title">พิมพ์แบบฟอร์ม</div>
    <div class="topbar-date" id="topbarDate"></div>
    <button class="btn btn-outline" onclick="history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      กลับ
    </button>
  </header>
  <div class="content">

    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">เลือกแบบฟอร์มที่ต้องการพิมพ์</div></div>
      <div style="padding:16px 20px">
        <div class="type-grid">
          <button class="type-btn active" id="tbMeter" onclick="selectType('meter')">
            <div class="icon">📋</div>
            <div class="name">สมุดจดมิเตอร์</div>
            <div class="desc">พิมพ์ล่วงหน้าก่อนออกจด</div>
          </button>
          <button class="type-btn" id="tbAbt" onclick="selectType('abt')">
            <div class="icon">🏛️</div>
            <div class="name">แบบฟอร์มส่ง อบต.</div>
            <div class="desc">รายงานประจำเดือน</div>
          </button>
          <button class="type-btn" id="tbReceipt" onclick="selectType('receipt')">
            <div class="icon">🧾</div>
            <div class="name">ใบเสร็จทั้งหมด</div>
            <div class="desc">พิมพ์ทีละใบทุกราย</div>
          </button>
        </div>

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--gray-100)">
          <label style="font-size:13px;font-weight:600;color:var(--gray-600)">เดือน</label>
          <select id="selMonth" style="height:38px;padding:0 10px;border:1.5px solid var(--gray-200);border-radius:var(--r);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none">
            <option value="1">มกราคม</option><option value="2">กุมภาพันธ์</option>
            <option value="3">มีนาคม</option><option value="4">เมษายน</option>
            <option value="5">พฤษภาคม</option><option value="6">มิถุนายน</option>
            <option value="7">กรกฎาคม</option><option value="8">สิงหาคม</option>
            <option value="9">กันยายน</option><option value="10">ตุลาคม</option>
            <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
          </select>
          <label style="font-size:13px;font-weight:600;color:var(--gray-600)">พ.ศ.</label>
          <select id="selYear" style="height:38px;padding:0 10px;border:1.5px solid var(--gray-200);border-radius:var(--r);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none"></select>
          <button class="btn btn-primary" onclick="loadAndPreview()">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ดูตัวอย่าง
          </button>
          <button class="btn btn-success" onclick="doPrint()">
            <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            พิมพ์เลย
          </button>
        </div>
      </div>
    </div>

    <div style="font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:8px">ตัวอย่างแบบฟอร์ม:</div>
    <div class="preview-wrap">
      <div id="previewArea" style="padding:30px;text-align:center;color:var(--gray-400)">
        กดปุ่ม "ดูตัวอย่าง" เพื่อแสดงแบบฟอร์ม
      </div>
    </div>
  </div>
</div>

<!-- Print area (hidden on screen) -->
<div class="print-area" id="printArea" style="display:none"></div>

<script src="config.js"></script>
<script src="sidebar.js"></script>
<script>
let currentType = 'meter', members = [], readings = [], invoices = [], config = {}, staff = [];

document.addEventListener('DOMContentLoaded', () => {
  if (!initPage('print-form')) return;
  const now = new Date();
  const selM = document.getElementById('selMonth');
  const selY = document.getElementById('selYear');
  selM.value = now.getMonth() + 1;
  const yr = now.getFullYear() + 543;
  for (let y = yr; y >= yr - 3; y--) {
    const o = document.createElement('option'); o.value = y; o.textContent = y; selY.appendChild(o);
  }
  selY.value = yr;

  // Check URL params
  const p = new URLSearchParams(window.location.search);
  if (p.get('type'))  selectType(p.get('type'));
  if (p.get('month')) selM.value = p.get('month');
  if (p.get('year'))  selY.value = p.get('year');
});

function selectType(t) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(t === 'meter' ? 'tbMeter' : t === 'abt' ? 'tbAbt' : 'tbReceipt').classList.add('active');
}

async function loadAndPreview() {
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;
  document.getElementById('previewArea').innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-400)">กำลังโหลดข้อมูล...</div>';
  try {
    const [mr, rr, ir, sr] = await Promise.all([
      apiAuth('getMembers'),
      apiAuth('getReadings', { month, year }),
      apiAuth('getInvoices', { month, year }),
      apiAuth('getSettings'),
    ]);
    members  = (mr.data || []).filter(m => m.status === 'active');
    readings = rr.data || [];
    invoices = ir.data || [];
    config   = sr.data?.config || {};
    staff    = sr.data?.staff  || [];
    const html = buildForm(month, year);
    document.getElementById('previewArea').innerHTML = html;
    document.getElementById('printArea').innerHTML   = html;
  } catch(e) {
    document.getElementById('previewArea').innerHTML = `<div style="padding:40px;text-align:center;color:red">โหลดไม่ได้: ${e.message}</div>`;
  }
}

function buildForm(month, year) {
  const user = Auth.user();
  const mNames = ['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const mName = mNames[month] || month;
  const title = `การประปา ${user.village_name || ''} ${user.village_area || ''}`;

  if (currentType === 'meter')   return buildMeterBook(mName, year, title);
  if (currentType === 'abt')     return buildAbt(mName, year, title);
  if (currentType === 'receipt') return buildAllReceipts(mName, year, title);
  return '';
}

function buildMeterBook(mName, year, title) {
  const rows = members.map((m, i) => `
    <tr>
      <td>${i + 1}</td>
      <td class="name-col">${m.title||''} ${m.first_name} ${m.last_name}</td>
      <td>${m.house_no || '—'}</td>
      <td style="font-family:monospace;font-size:10px">${m.meter_id || '—'}</td>
      <td style="width:70px">&nbsp;</td><td style="width:80px">&nbsp;</td>
      <td style="width:70px">&nbsp;</td><td style="width:80px">&nbsp;</td>
      <td style="width:70px">&nbsp;</td><td>&nbsp;</td>
    </tr>`).join('');

  return `<div>
    <div class="mb-header">
      <div class="mb-title">บัญชีรายชื่อสมาชิกผู้ใช้น้ำ ${title}</div>
      <div class="mb-period">ประจำเดือน <span class="mb-fill">${mName}</span> พ.ศ. <span class="mb-fill">${year}</span></div>
    </div>
    <table class="mb-table">
      <thead>
        <tr>
          <th rowspan="2">ที่</th><th rowspan="2">รายชื่อ</th><th rowspan="2">บ้านเลขที่</th><th rowspan="2">เลขมิเตอร์</th>
          <th colspan="2">จดครั้งก่อน</th><th colspan="2">จดครั้งหลัง</th>
          <th rowspan="2">หน่วยที่ใช้</th><th rowspan="2">จำนวนเงิน</th>
        </tr>
        <tr><th>เลข</th><th>วันที่</th><th>เลข</th><th>วันที่</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:14px;display:flex;justify-content:space-between;font-size:12px">
      <span>จำนวนสมาชิก ${members.length} ราย</span>
      <span>หน่วยละ ${config.rate_per_unit || 7} บาท</span>
    </div>
    <div class="sign-area">
      <div><div class="sign-line">...........................</div><div>ผู้จดมิเตอร์</div></div>
      <div><div class="sign-line">...........................</div><div>เหรัญญิก</div></div>
    </div>
  </div>`;
}

function buildAbt(mName, year, title) {
  const rdgMap = {}; readings.forEach(r => rdgMap[r.member_id] = r);
  const invMap = {}; invoices.forEach(i => invMap[i.member_id] = i);
  let totalUnits = 0, totalAmt = 0;

  const rows = members.map((m, i) => {
    const r = rdgMap[m.member_id] || {};
    const inv = invMap[m.member_id] || {};
    const units = parseFloat(r.units_used) || 0;
    const amt   = parseFloat(inv.total_amount) || 0;
    totalUnits += units; totalAmt += amt;
    return `<tr>
      <td>${i + 1}</td><td class="name-col">${m.title||''} ${m.first_name} ${m.last_name}</td>
      <td>${m.house_no||'—'}</td><td>${r.prev_reading||''}</td><td>${r.curr_reading||''}</td>
      <td>${units || ''}</td><td>${amt ? amt.toLocaleString('th-TH') : ''}</td>
      <td>${inv.status === 'paid' ? '✓' : ''}</td>
    </tr>`;
  }).join('');

  const collector = staff.find(s => s.role_type === 'collector' && s.status === 'active');
  const treasurer = staff.find(s => s.role_type === 'treasurer' && s.status === 'active');

  return `<div>
    <div class="abt-title">${title}</div>
    <div class="abt-sub">รายงานค่าน้ำประปาประจำเดือน ${mName} พ.ศ. ${year}</div>
    <div style="display:flex;gap:30px;font-size:13px;margin:10px 0">
      <span>จำนวนสมาชิก ${members.length} ราย</span>
      <span>อัตราค่าน้ำ ${config.rate_per_unit || 7} บาท/หน่วย</span>
    </div>
    <table class="abt-table">
      <thead><tr>
        <th>ที่</th><th>ชื่อ-สกุล</th><th>บ้านเลขที่</th>
        <th>จดครั้งก่อน</th><th>จดครั้งหลัง</th>
        <th>หน่วยที่ใช้</th><th>จำนวนเงิน(บาท)</th><th>ชำระ</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="abt-total">
          <td colspan="5" style="text-align:right">รวมทั้งหมด</td>
          <td>${totalUnits.toLocaleString('th-TH')}</td>
          <td>${totalAmt.toLocaleString('th-TH')}</td>
          <td></td>
        </tr>
      </tbody>
    </table>
    <div class="abt-summary">
      <div style="font-weight:700;text-decoration:underline;margin-bottom:6px">สรุปรายรับ</div>
      <div class="abt-sum-row"><span>จำนวนสมาชิก</span><span>${members.length} ราย</span></div>
      <div class="abt-sum-row"><span>รวมหน่วยที่ใช้</span><span>${totalUnits.toLocaleString('th-TH')} หน่วย</span></div>
      <div class="abt-sum-row"><span>รวมรายรับทั้งหมด</span><span>${totalAmt.toLocaleString('th-TH')} บาท</span></div>
    </div>
    <div class="sign-area">
      <div><div class="sign-line">${collector?.full_name || '......................'}</div><div>ผู้เก็บเงิน</div></div>
      <div><div class="sign-line">${treasurer?.full_name || '......................'}</div><div>เหรัญญิก</div></div>
    </div>
  </div>`;
}

function buildAllReceipts(mName, year, title) {
  const user = Auth.user();
  const collector = staff.find(s => s.role_type === 'collector' && s.status === 'active');
  const treasurer = staff.find(s => s.role_type === 'treasurer' && s.status === 'active');
  if (!invoices.length) return '<div style="text-align:center;padding:40px;color:#999">ยังไม่มีใบเสร็จเดือนนี้</div>';

  return invoices.map(inv => {
    const m = inv.member || {};
    const total = parseFloat(inv.total_amount) || 0;
    return `<div class="r-single">
      <div class="r-head">
        <div class="r-org">การประปา ${user.village_name || ''}</div>
        <div style="font-size:12px;color:#555">${user.village_area || ''}</div>
        <div style="font-size:13px;font-weight:700;margin-top:4px">ใบเสร็จรับเงิน</div>
        <div style="font-size:11px;color:#555">เล่มที่ ${inv.book_no||'—'} เลขที่ ${inv.invoice_no||'—'} · เดือน ${mName} ${year}</div>
      </div>
      <hr class="r-dashed">
      <div class="r-row"><span class="lbl">ชื่อผู้ใช้น้ำ</span><span class="val">${m.first_name||''} ${m.last_name||''}</span></div>
      <div class="r-row"><span class="lbl">บ้านเลขที่</span><span class="val">${m.house_no||'—'}</span></div>
      <div class="r-row"><span class="lbl">เลขมิเตอร์</span><span class="val">${m.meter_id||'—'}</span></div>
      <hr class="r-dashed">
      <div class="r-row"><span class="lbl">เลขมิเตอร์ก่อน → หลัง</span><span class="val">${inv.prev_reading||0} → ${inv.curr_reading||0}</span></div>
      <div class="r-row"><span class="lbl">ค่าน้ำ ${inv.units_used||0} หน่วย × ${inv.rate||config.rate_per_unit||7} บาท</span><span class="val">${(parseFloat(inv.water_fee)||0).toLocaleString('th-TH')} บาท</span></div>
      ${parseFloat(inv.maintenance_fee)>0?`<div class="r-row"><span class="lbl">ค่ารักษามิเตอร์</span><span class="val">${(parseFloat(inv.maintenance_fee)||0).toLocaleString('th-TH')} บาท</span></div>`:''}
      <div class="r-total"><span>รวมเงิน</span><span>${total.toLocaleString('th-TH')} บาท</span></div>
      <div class="r-sign">
        <div><div class="r-sign-line">${collector?.full_name||'......................'}</div><div>ผู้เก็บเงิน</div></div>
        <div><div class="r-sign-line">${treasurer?.full_name||'......................'}</div><div>เหรัญญิก</div></div>
      </div>
    </div>`;
  }).join('');
}

function doPrint() {
  if (!document.getElementById('printArea').innerHTML) {
    loadAndPreview().then(() => setTimeout(window.print, 600));
  } else {
    window.print();
  }
}
</script>
</body>
</html>
