<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเกียรติบัตร - รร.บ้านเขาหัวนา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Sarabun', sans-serif; }
        td { vertical-align: top; padding-top: 12px !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="h-full bg-slate-100">

<div id="app" class="flex flex-col h-full overflow-hidden">
    <header class="bg-indigo-800 text-white px-6 py-4 shadow-lg flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl font-bold">ศิลปหัตถกรรมนักเรียน ครั้งที่ 73</h1>
            <p class="text-indigo-200 text-sm">โรงเรียนบ้านเขาหัวนา | <span id="adminText">บุคคลทั่วไป</span></p>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden md:flex gap-2 text-xs font-bold">
                <div class="bg-white/10 px-3 py-1 rounded">ทั้งหมด: <span id="countAll">0</span></div>
                <div class="bg-rose-500/20 px-3 py-1 rounded border border-rose-400">ค้าง: <span id="countPending">0</span></div>
            </div>
            <button onclick="loginAdmin()" id="btnLogin" class="bg-white text-indigo-800 px-4 py-1.5 rounded-lg font-bold text-sm">Admin</button>
            <button onclick="logoutAdmin()" id="btnLogout" class="hidden bg-rose-500 text-white px-4 py-1.5 rounded-lg font-bold text-sm">ออก</button>
        </div>
    </header>

    <div class="bg-white border-b p-4 flex flex-col md:flex-row gap-4 shrink-0">
        <div class="flex-1 relative">
            <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
            <input type="text" id="searchInput" oninput="runSearch()" placeholder="ค้นหาชื่อรายการ, นักเรียน..." class="w-full pl-10 pr-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="flex gap-2">
            <button onclick="openModal()" class="admin-only hidden bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold">เพิ่มข้อมูล</button>
            <button onclick="exportCSV()" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-sm font-bold">Export</button>
            <a href="https://drive.google.com/drive/folders/1Nad7KZe3Hj3ABCcLwEGanCJFA1vFmVP7?usp=sharing" target="_blank" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm flex items-center">Drive</a>
        </div>
    </div>

    <div class="flex-1 overflow-auto p-4 md:p-6 custom-scrollbar">
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-[13px] text-left border-collapse" id="mainTable">
                <thead class="bg-slate-50 border-b text-slate-500 uppercase font-bold">
                    <tr>
                        <th class="px-4 py-4 text-center cursor-pointer" onclick="sortTable(1)">#</th>
                        <th class="px-4 py-4 cursor-pointer" onclick="sortTable(2)">รหัส</th>
                        <th class="px-4 py-4 cursor-pointer" onclick="sortTable(3)">รายการกิจกรรม</th>
                        <th class="px-4 py-4 cursor-pointer" onclick="sortTable(4)">ระดับชั้น</th>
                        <th class="px-4 py-4 cursor-pointer" onclick="sortTable(7)">ชื่อ - สกุล</th>
                        <th class="px-4 py-4" onclick="sortTable(8)">ผลการแข่งขัน</th>
                        <th class="px-4 py-4 text-center" onclick="sortTable(9)">สถานะ(นร.)</th>
                        <th class="px-4 py-4 text-center admin-only hidden">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="text-center py-20 text-slate-400 font-bold">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden">
        <div class="px-6 py-4 bg-indigo-50 border-b flex justify-between items-center font-bold">
            <span id="modalTitle">บันทึกข้อมูล</span>
            <button onclick="closeModal()" class="text-slate-400 hover:text-rose-500"><i class="fas fa-times"></i></button>
        </div>
        <form id="entryForm" class="p-6 grid grid-cols-2 gap-4 text-sm">
            <input type="hidden" id="fRowNum">
            <div class="col-span-1"><label class="font-bold">ลำดับ</label><input type="number" id="f1" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-1"><label class="font-bold">รหัสรายการ</label><input type="text" id="f2" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-2"><label class="font-bold">กิจกรรม</label><input type="text" id="f3" class="w-full border rounded-lg p-2 bg-slate-50" required></div>
            <div class="col-span-1"><label class="font-bold">ระดับชั้น</label><input type="text" id="f4" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-1"><label class="font-bold">ชื่อ - สกุล</label><input type="text" id="f7" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-2"><label class="font-bold">ผลการแข่งขัน</label><input type="text" id="f8" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-1"><label class="font-bold">สถานะ</label>
                <select id="f9" class="w-full border rounded-lg p-2 bg-slate-50">
                    <option value="ยังไม่ได้รับ">ยังไม่ได้รับ</option><option value="ได้รับแล้ว">ได้รับแล้ว</option>
                </select>
            </div>
            <div class="col-span-1"><label class="font-bold">หมายเหตุ</label><input type="text" id="f11" class="w-full border rounded-lg p-2 bg-slate-50"></div>
            <div class="col-span-2 flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeModal()" class="px-4 py-2">ยกเลิก</button>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">บันทึก</button>
            </div>
        </form>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VkzCceae_GBTjCBJjoXhddmTjxToQCYzL79bQslBqwRgdHL-tyCMLQbf1xQfO_-W/exec";
    let allData = [];

    window.onload = () => {
        if(localStorage.getItem('admin_73') === 'true') applyAdmin(true);
        loadData();
    };

    async function loadData() {
        const tbody = document.getElementById('tableBody');
        try {
            const resp = await fetch(`${WEB_APP_URL}?action=getData`);
            const res = await resp.json();
            allData = res.rows || [];
            updateStats();
            renderTable(allData);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-20 text-rose-500">ผิดพลาด! กรุณาเช็คการ Deploy เป็น Anyone</td></tr>';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const admin = localStorage.getItem('admin_73') === 'true';
        tbody.innerHTML = data.map(row => {
            const done = row.c9 === 'ได้รับแล้ว';
            return `
            <tr class="hover:bg-indigo-50/30 border-b border-slate-50">
                <td class="px-4 py-3 text-center text-slate-400 font-bold">${row.c1}</td>
                <td class="px-4 py-3"><span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded text-[10px] font-bold">${row.c2 || '-'}</span></td>
                <td class="px-4 py-3 font-bold text-slate-800">${row.c3}</td>
                <td class="px-4 py-3 text-slate-500">${row.c4}</td>
                <td class="px-4 py-3" style="max-width:200px"><strong>${row.c7 || ''}</strong></td>
                <td class="px-4 py-3 text-slate-500 text-[11px]">${row.c8}</td>
                <td class="px-4 py-3 text-center">
                    <span onclick="${admin ? `fastToggle(${row.rowNum}, '${row.c9}')` : ''}" 
                          class="inline-block px-3 py-1 rounded-full text-[10px] font-bold ${admin ? 'cursor-pointer' : ''} ${done ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                        ${row.c9}
                    </span>
                </td>
                <td class="px-4 py-3 admin-only ${admin ? '' : 'hidden'} text-center">
                    <div class="flex gap-2 justify-center">
                        <button onclick='editRow(${JSON.stringify(row)})' class="text-blue-500"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow(${row.rowNum})" class="text-rose-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // --- ฟังก์ชันหลัก ---
    function loginAdmin() {
        if(prompt("Password:") === "admin1234") {
            localStorage.setItem('admin_73', 'true');
            applyAdmin(true);
            renderTable(allData);
        }
    }
    function logoutAdmin() {
        localStorage.removeItem('admin_73');
        location.reload();
    }
    function applyAdmin(admin) {
        document.getElementById('adminText').innerText = admin ? "โหมดผู้ดูแล (Admin)" : "บุคคลทั่วไป";
        document.getElementById('btnLogin').classList.toggle('hidden', admin);
        document.getElementById('btnLogout').classList.toggle('hidden', !admin);
        document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !admin));
    }
    function updateStats() {
        const total = allData.length;
        const received = allData.filter(r => r.c9 === 'ได้รับแล้ว').length;
        document.getElementById('countAll').innerText = total;
        document.getElementById('countPending').innerText = total - received;
    }
    async function fastToggle(num, cur) {
        const next = cur === 'ได้รับแล้ว' ? 'ยังไม่ได้รับ' : 'ได้รับแล้ว';
        const idx = allData.findIndex(r => r.rowNum == num);
        allData[idx].c9 = next;
        renderTable(allData);
        updateStats();
        await fetch(`${WEB_APP_URL}?action=updateField&rowNum=${num}&colName=c9&newValue=${encodeURIComponent(next)}`);
    }
    function sortTable(n) {
        const key = 'c' + n;
        allData.sort((a,b) => String(a[key]).localeCompare(String(b[key]), 'th', {numeric: true}));
        renderTable(allData);
    }
    function runSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        renderTable(allData.filter(r => JSON.stringify(r).toLowerCase().includes(v)));
    }
    // ... ฟังก์ชัน Modal/Delete ใส่ไว้เหมือนตัวอย่างก่อนหน้า ...
</script>
</body>
</html>
