<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดเก็บข้อมูลศิลปหัตถกรรม ครั้งที่ 73</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Sarabun', sans-serif; }
        .table-row-hover:hover { background: rgba(79, 70, 229, 0.04); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        td { vertical-align: top; padding-top: 12px !important; }
        .col-name { min-width: 180px; max-width: 220px; white-space: normal; word-wrap: break-word; }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">

<div id="app" class="h-full flex flex-col overflow-hidden">
    <header class="bg-gradient-to-r from-indigo-700 to-blue-600 text-white px-6 py-4 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl md:text-2xl font-bold">ศิลปหัตถกรรมนักเรียน ครั้งที่ 73</h1>
            <p class="text-indigo-100 text-sm">โรงเรียนบ้านเขาหัวนา | <span id="adminStatus">โหมดบุคคลทั่วไป</span></p>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden md:flex gap-2">
                <div class="bg-white/10 px-3 py-1 rounded text-xs">ทั้งหมด: <span id="countAll">0</span></div>
                <div class="bg-emerald-500/20 px-3 py-1 rounded text-xs">ได้รับ: <span id="countReceived">0</span></div>
            </div>
            <button onclick="loginAdmin()" id="btnLogin" class="bg-white text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-50 transition">
                <i class="fas fa-lock me-2"></i>Admin
            </button>
            <button onclick="logoutAdmin()" id="btnLogout" class="hidden bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-rose-600 transition">
                <i class="fas fa-sign-out-alt me-2"></i>ออก
            </button>
        </div>
    </header>

    <div class="bg-white border-b px-6 py-3 flex flex-col md:flex-row justify-between gap-3 shadow-sm">
        <div class="flex flex-1 gap-2">
            <div class="relative flex-1 max-w-md">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="runSearch()" placeholder="ค้นหารายการ, ชื่อนักเรียน..." class="w-full pl-10 pr-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <a href="https://drive.google.com/drive/folders/1Nad7KZe3Hj3ABCcLwEGanCJFA1vFmVP7?usp=sharing" target="_blank" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm flex items-center transition">
                <i class="fab fa-google-drive me-2 text-emerald-600"></i> ดูเกียรติบัตร (Drive)
            </a>
        </div>
        <div class="flex gap-2">
            <button onclick="openModal()" class="admin-only hidden bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-sm font-bold transition shadow-md">
                <i class="fas fa-plus me-2"></i>เพิ่มข้อมูล
            </button>
            <button onclick="exportCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl text-sm font-bold transition shadow-md">
                <i class="fas fa-file-csv me-2"></i>Export
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-auto p-4 md:p-6 custom-scrollbar">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm text-left border-collapse" id="mainTable">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
                    <tr>
                        <th class="px-4 py-4 font-bold cursor-pointer hover:text-indigo-600" onclick="sortTable(0)"># <i class="fas fa-sort text-[10px]"></i></th>
                        <th class="px-4 py-4 font-bold cursor-pointer" onclick="sortTable(1)">รหัส</th>
                        <th class="px-4 py-4 font-bold cursor-pointer" onclick="sortTable(2)">กิจกรรม</th>
                        <th class="px-4 py-4 font-bold">ระดับชั้น</th>
                        <th class="px-4 py-4 font-bold col-name">ชื่อ - สกุล</th>
                        <th class="px-4 py-4 font-bold">ผลการแข่งขัน</th>
                        <th class="px-4 py-4 font-bold text-center">สถานะ(นร.)</th>
                        <th class="px-4 py-4 font-bold admin-only hidden">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="text-center py-10 text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden scale-95 transition-transform">
        <div class="px-6 py-4 bg-indigo-50 border-b flex justify-between items-center">
            <h3 id="modalTitle" class="font-bold text-lg text-indigo-900">เพิ่มรายการ</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-rose-500 transition"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form id="entryForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="fRowNum">
            <div class="md:col-span-2 grid grid-cols-3 gap-3">
                <div><label class="text-[11px] font-bold text-slate-500 uppercase">ลำดับ</label><input type="number" id="f1" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
                <div class="col-span-2"><label class="text-[11px] font-bold text-slate-500 uppercase">รหัสรายการ</label><input type="text" id="f2" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
            </div>
            <div class="md:col-span-2"><label class="text-[11px] font-bold text-slate-500 uppercase">กิจกรรม</label><input type="text" id="f3" class="w-full border rounded-xl p-2.5 bg-slate-50" required></div>
            <div><label class="text-[11px] font-bold text-slate-500 uppercase">ระดับชั้น</label><input type="text" id="f4" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
            <div><label class="text-[11px] font-bold text-slate-500 uppercase">กลุ่มสาระ</label><input type="text" id="f6" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
            <div class="md:col-span-2"><label class="text-[11px] font-bold text-slate-500 uppercase">ชื่อ - สกุล ผู้เข้าแข่งขัน</label><textarea id="f7" rows="2" class="w-full border rounded-xl p-2.5 bg-slate-50"></textarea></div>
            <div class="md:col-span-2"><label class="text-[11px] font-bold text-slate-500 uppercase">ผลการแข่งขัน</label><input type="text" id="f8" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
            <div><label class="text-[11px] font-bold text-slate-500 uppercase">สถานะเกียรติบัตร(นร.)</label>
                <select id="f9" class="w-full border rounded-xl p-2.5 bg-slate-50">
                    <option value="ยังไม่ได้รับ">ยังไม่ได้รับ</option><option value="ได้รับแล้ว">ได้รับแล้ว</option>
                </select>
            </div>
            <div><label class="text-[11px] font-bold text-slate-500 uppercase">หมายเหตุ</label><input type="text" id="f11" class="w-full border rounded-xl p-2.5 bg-slate-50"></div>
            <div class="md:col-span-2 flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeModal()" class="px-6 py-2 text-slate-500 font-bold">ยกเลิก</button>
                <button type="submit" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VkzCceae_GBTjCBJjoXhddmTjxToQCYzL79bQslBqwRgdHL-tyCMLQbf1xQfO_-W/exec";
    let allData = [];
    let isAdmin = false;

    async function loadData() {
        try {
            const resp = await fetch(`${WEB_APP_URL}?action=getData`);
            const res = await resp.json();
            allData = res.rows;
            updateUI(res.stats);
            renderTable(allData);
        } catch (e) { console.error(e); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.map(row => {
            const isDone = row.c9 === 'ได้รับแล้ว';
            return `
            <tr class="table-row-hover transition-colors">
                <td class="px-4 py-3 font-medium text-slate-400">${row.c1}</td>
                <td class="px-4 py-3"><span class="bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md text-[10px] font-bold">${row.c2 || '-'}</span></td>
                <td class="px-4 py-3 font-bold text-slate-700">${row.c3}</td>
                <td class="px-4 py-3 text-slate-500 text-xs">${row.c4}</td>
                <td class="px-4 py-3 col-name"><strong>${row.c7 || ''}</strong></td>
                <td class="px-4 py-3 text-slate-500 text-xs">${row.c8}</td>
                <td class="px-4 py-3 text-center">
                    <span onclick="${isAdmin ? `fastToggle(${row.rowNum}, '${row.c9}')` : ''}" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold cursor-pointer ${isDone ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                        ${row.c9 || 'ยังไม่ได้รับ'}
                    </span>
                </td>
                <td class="px-4 py-3 admin-only ${isAdmin ? '' : 'hidden'}">
                    <div class="flex gap-2 justify-center">
                        <button onclick='editRow(${JSON.stringify(row)})' class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow(${row.rowNum})" class="text-rose-500 hover:text-rose-700"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // --- Admin Functions ---
    function loginAdmin() {
        const p = prompt("ใส่รหัสผ่าน Admin:");
        if (p === "admin1234") {
            isAdmin = true;
            document.getElementById('btnLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            document.getElementById('adminStatus').innerText = "โหมดผู้ดูแล (Admin)";
            document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            renderTable(allData);
        }
    }

    function logoutAdmin() {
        isAdmin = false;
        location.reload();
    }

    async function fastToggle(rowNum, current) {
        const next = current === 'ได้รับแล้ว' ? 'ยังไม่ได้รับ' : 'ได้รับแล้ว';
        await fetch(`${WEB_APP_URL}?action=updateField&rowNum=${rowNum}&colName=c9&newValue=${encodeURIComponent(next)}`);
        loadData();
    }

    // --- Modal Control ---
    function openModal(data = null) {
        const m = document.getElementById('modal');
        m.classList.remove('hidden'); m.classList.add('flex');
        if (data) {
            document.getElementById('modalTitle').innerText = "แก้ไขข้อมูล";
            document.getElementById('fRowNum').value = data.rowNum;
            ['1','2','3','4','6','7','8','9','11'].forEach(i => document.getElementById('f'+i).value = data['c'+i]);
        } else {
            document.getElementById('modalTitle').innerText = "เพิ่มรายการใหม่";
            document.getElementById('entryForm').reset();
            document.getElementById('fRowNum').value = "";
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }

    document.getElementById('entryForm').onsubmit = async (e) => {
        e.preventDefault();
        const rowNum = document.getElementById('fRowNum').value;
        const action = rowNum ? 'updateField' : 'addRow';
        const params = new URLSearchParams({ action, rowNum });
        ['1','2','3','4','6','7','8','9','11'].forEach(i => params.append('c'+i, document.getElementById('f'+i).value));
        
        await fetch(`${WEB_APP_URL}?${params.toString()}`);
        closeModal(); loadData();
    };

    async function deleteRow(num) {
        if(confirm("ลบรายการนี้?")) {
            await fetch(`${WEB_APP_URL}?action=deleteRow&rowNum=${num}`);
            loadData();
        }
    }

    function editRow(row) { openModal(row); }

    function runSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(r => JSON.stringify(r).toLowerCase().includes(val));
        renderTable(filtered);
    }

    function sortTable(n) {
        allData.sort((a, b) => {
            const v1 = String(a['c' + (n + 1)]);
            const v2 = String(b['c' + (n + 1)]);
            return v1.localeCompare(v2, 'th', { numeric: true });
        });
        renderTable(allData);
    }

    function updateUI(s) {
        document.getElementById('countAll').innerText = s.total;
        document.getElementById('countReceived').innerText = s.received;
    }

    window.onload = loadData;
</script>
</body>
</html>
