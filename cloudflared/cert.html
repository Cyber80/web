<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .status-done { color: green; font-weight: bold; }
    .status-wait { color: red; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h2 class="mb-3">ระบบติดตามเกียรติบัตร ศิลปหัตถกรรมครั้งที่ 73 - รร.บ้านเขาหัวนา</h2>
  
  <div class="row g-3 mb-3">
    <div class="col-md-8">
      <input type="text" id="searchInput" class="form-control" placeholder="ค้นหาชื่อนักเรียน, กิจกรรม หรือรหัสรายการ...">
    </div>
    <div class="col-md-4 text-end">
      <a href="https://drive.google.com/drive/folders/1Nad7KZe3Hj3ABCcLwEGanCJFA1vFmVP7?usp=sharing" target="_blank" class="btn btn-primary">📁 ดูโฟลเดอร์เกียรติบัตร</a>
      <button onclick="exportTableToCSV('data.csv')" class="btn btn-success">📊 Export CSV</button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>รหัส</th>
          <th>กิจกรรม</th>
          <th>ชื่อ-สกุล</th>
          <th>ผลการแข่งขัน</th>
          <th>เกียรติบัตร (นักเรียน)</th>
          <th>แก้ไข</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>
</div>

<script>
  // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
  window.onload = () => {
    google.script.run.withSuccessHandler(renderTable).getData();
  };

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    data.forEach(item => {
      const row = `<tr>
        <td>${item['รหัสรายการ']}</td>
        <td>${item['กิจกรรม']}</td>
        <td>${item['ชื่อ - สกุล ผู้เข้าแข่งขัน']}</td>
        <td>${item['ผลการแข่งขันและระดับเหรียญ']}</td>
        <td class="${item['เกียรติบัตร(นักเรียน)'] === 'ได้รับแล้ว' ? 'status-done' : 'status-wait'}">
          ${item['เกียรติบัตร(นักเรียน)']}
        </td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editRow(${item.rowNum}, '${item['เกียรติบัตร(นักเรียน)']}')">เปลี่ยนสถานะ</button>
        </td>
      </tr>`;
      tbody.innerHTML += row;
    });
  }

  function editRow(rowNum, currentStatus) {
    const newStatus = currentStatus === 'ได้รับแล้ว' ? 'ยังไม่ได้รับ' : 'ได้รับแล้ว';
    google.script.run.withSuccessHandler(() => {
      google.script.run.withSuccessHandler(renderTable).getData();
    }).updateStatus(rowNum, 'เกียรติบัตร(นักเรียน)', newStatus);
  }

  // ฟังก์ชันค้นหา
  document.getElementById('searchInput').addEventListener('keyup', function() {
    const val = this.value.toLowerCase();
    const rows = document.querySelectorAll('#tableBody tr');
    rows.forEach(row => {
      row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
    });
  });

  // ฟังก์ชัน Export
  function exportTableToCSV(filename) {
    let csv = [];
    const rows = document.querySelectorAll("table tr");
    for (let i = 0; i < rows.length; i++) {
      let row = [], cols = rows[i].querySelectorAll("td, th");
      for (let j = 0; j < cols.length - 1; j++) row.push(cols[j].innerText);
      csv.push(row.join(","));
    }
    const csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
    const downloadLink = document.createElement("a");
    downloadLink.download = filename;
    downloadLink.href = window.URL.createObjectURL(csvFile);
    downloadLink.click();
  }
</script>
</body>
</html>
