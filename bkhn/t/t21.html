<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนิเทศภายในโรงเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px; background: linear-gradient(180deg, #1a237e 0%, #283593 100%);
            color: white; display: flex; flex-direction: column;
            position: fixed; height: 100vh; transition: width 0.3s; z-index: 100; overflow: hidden;
        }
        .sidebar.collapsed { width: 70px; }
        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; white-space: nowrap; }
        .logo i { font-size: 24px; color: #64b5f6; }
        .toggle-btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 4px; }
        .nav-menu { flex: 1; padding: 16px 0; overflow-y: auto; }
        .nav-section-title {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.4); padding: 8px 20px; white-space: nowrap;
        }
        .sidebar.collapsed .nav-section-title { opacity: 0; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.2s;
            white-space: nowrap; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.15); color: white;
            border-left: 3px solid #64b5f6;
        }
        .nav-item i { font-size: 18px; min-width: 20px; text-align: center; }
        .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 38px; height: 38px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .user-details { display: flex; flex-direction: column; white-space: nowrap; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 12px; color: rgba(255,255,255,0.6); }
        .sidebar.collapsed .user-details,
        .sidebar.collapsed .logo span,
        .sidebar.collapsed .nav-item span { display: none; }
        /* ===== MAIN CONTENT ===== */
        .main-content { margin-left: 260px; flex: 1; transition: margin-left 0.3s; min-height: 100vh; }
        .main-content.expanded { margin-left: 70px; }
        /* ===== TOPBAR ===== */
        .topbar {
            background: white; padding: 16px 24px; display: flex;
            align-items: center; justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 50;
        }
        .topbar-left h2 { font-size: 20px; font-weight: 700; color: #1a237e; }
        .breadcrumb { font-size: 12px; color: #9e9e9e; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: #f5f5f5; border-radius: 8px; padding: 8px 14px;
        }
        .search-box input { border: none; background: none; outline: none; font-family: 'Sarabun', sans-serif; width: 200px; }
        .notification-bell { position: relative; cursor: pointer; font-size: 20px; color: #616161; }
        .badge {
            position: absolute; top: -6px; right: -6px; background: #f44336;
            color: white; font-size: 10px; width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .current-date { font-size: 13px; color: #616161; white-space: nowrap; }
        /* ===== PAGES ===== */
        .pages-container { padding: 24px; }
        .page { display: none; }
        .page.active { display: block; }
        /* ===== STATS GRID ===== */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white; border-radius: 12px; padding: 20px;
            display: flex; align-items: center; gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }
        .stat-card.blue::before { background: #1565c0; }
        .stat-card.green::before { background: #2e7d32; }
        .stat-card.orange::before { background: #e65100; }
        .stat-card.purple::before { background: #6a1b9a; }
        .stat-icon {
            width: 52px; height: 52px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .stat-card.blue .stat-icon { background: #e3f2fd; color: #1565c0; }
        .stat-card.green .stat-icon { background: #e8f5e9; color: #2e7d32; }
        .stat-card.orange .stat-icon { background: #fff3e0; color: #e65100; }
        .stat-card.purple .stat-icon { background: #f3e5f5; color: #6a1b9a; }
        .stat-info { flex: 1; }
        .stat-number { font-size: 28px; font-weight: 700; color: #212121; }
        .stat-label { font-size: 13px; color: #757575; }
        .stat-trend { font-size: 12px; font-weight: 600; }
        .stat-trend.up { color: #2e7d32; }
        .stat-trend.down { color: #c62828; }
        /* ===== CHARTS ===== */
        .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
        .chart-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-container { height: 250px; position: relative; }
        .legend-container { margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        /* ===== SECTION CARD ===== */
        .section-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px;
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .card-header h3 { font-size: 16px; font-weight: 600; color: #1a237e; display: flex; align-items: center; gap: 8px; }
        .btn-text { background: none; border: none; color: #1565c0; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 13px; }
        /* ===== KPI OVERVIEW ===== */
        .kpi-overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .kpi-ov-card { background: #f8f9ff; border-radius: 10px; padding: 16px; text-align: center; }
        .kpi-ov-title { font-size: 13px; color: #616161; margin-bottom: 8px; }
        .kpi-ov-score { font-size: 32px; font-weight: 700; }
        .kpi-ov-max { font-size: 12px; color: #9e9e9e; }
        .kpi-ov-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .kpi-ov-fill { height: 100%; border-radius: 3px; transition: width 1s; }
        /* ===== TABLE ===== */
        .table-responsive { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th {
            background: #f5f7ff; color: #1a237e; font-weight: 600;
            padding: 12px 16px; text-align: left; white-space: nowrap;
        }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: #424242; }
        .data-table tr:hover { background: #fafafa; }
        .status-badge {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap;
        }
        .status-excellent { background: #e8f5e9; color: #1b5e20; }
        .status-good { background: #e3f2fd; color: #0d47a1; }
        .status-fair { background: #fff8e1; color: #e65100; }
        .status-needImprove { background: #ffebee; color: #b71c1c; }
        .status-pending { background: #f3e5f5; color: #4a148c; }
        /* ===== PAGE ACTIONS ===== */
        .page-actions {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .search-filter { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-filter input, .search-filter select {
            padding: 9px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
            font-family: 'Sarabun', sans-serif; font-size: 14px; outline: none;
        }
        .search-filter input:focus, .search-filter select:focus { border-color: #1565c0; }
        /* ===== BUTTONS ===== */
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-primary { background: #1565c0; color: white; }
        .btn-primary:hover { background: #0d47a1; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-warning { background: #e65100; color: white; }
        .btn-secondary { background: #757575; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        /* ===== TEACHERS GRID ===== */
        .teachers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .teacher-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s;
        }
        .teacher-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
        .teacher-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .teacher-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .teacher-meta h4 { font-size: 15px; font-weight: 600; color: #212121; }
        .teacher-meta span { font-size: 12px; color: #757575; }
