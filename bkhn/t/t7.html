
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50">

  <nav class="fixed top-0 z-50 w-full bg-white border-b border-gray-200">
    <div class="px-3 py-3 lg:px-5 lg:pl-3">
      <div class="flex items-center justify-between">
        <span class="self-center text-xl font-semibold sm:text-2xl whitespace-nowrap text-blue-700">BKHN Admin Panel</span>
        <div class="flex items-center">
           <button onclick="showSection('config')" class="text-gray-500 hover:text-blue-600 px-3">ตั้งค่าระบบ</button>
           <button onclick="logout()" class="text-red-500 font-bold px-3">ออกจากระบบ</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="p-4 mt-14">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="p-6 bg-white border rounded-lg shadow-sm">
        <h5 class="text-gray-500">เกียรติบัตรทั้งหมด</h5>
        <p class="text-3xl font-bold text-blue-600" id="stat-total">0</p>
      </div>
      <div class="p-6 bg-white border rounded-lg shadow-sm">
        <h5 class="text-gray-500">รออัปโหลดไฟล์รูป</h5>
        <p class="text-3xl font-bold text-red-500" id="stat-missing">0</p>
      </div>
      <div class="p-6 bg-white border rounded-lg shadow-sm">
        <button onclick="openImportModal()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">+ เพิ่มเกียรติบัตรใหม่</button>
      </div>
    </div>

    <div class="relative overflow-x-auto shadow-md sm:rounded-lg bg-white p-4">
      <div class="flex items-center justify-between pb-4">
        <h2 class="text-lg font-bold">รายการเกียรติบัตรในระบบ</h2>
        <div class="flex gap-2">
            <button onclick="exportCSV()" class="bg-gray-200 px-3 py-1 rounded">Export CSV</button>
            <input type="text" id="table-search" class="block p-2 text-sm text-gray-900 border border-gray-300 rounded-lg w-80 bg-gray-50" placeholder="ค้นหาชื่อคน/กิจกรรม...">
        </div>
      </div>
      <table class="w-full text-sm text-left text-gray-500">
        <thead class="text-xs text-gray-700 uppercase bg-gray-100">
          <tr>
            <th class="px-6 py-3">ปี พ.ศ.</th>
            <th class="px-6 py-3">ชื่อ-นามสกุล</th>
            <th class="px-6 py-3">กิจกรรม</th>
            <th class="px-6 py-3">สถานะรูป</th>
            <th class="px-6 py-3">จัดการ</th>
          </tr>
        </thead>
        <tbody id="cert-table-body">
          </tbody>
      </table>
    </div>
  </div>

  <div id="import-modal" class="hidden fixed inset-0 z-50 bg-gray-900 bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-lg p-6 w-full max-w-4xl max-h-[90vh] overflow-y-auto">
      <h3 class="text-xl font-bold mb-4">เพิ่มข้อมูลเกียรติบัตร</h3>
      <div class="grid grid-cols-2 gap-4 mb-4">
          <input type="text" id="new-year" placeholder="ปี พ.ศ. (เช่น 2567)" class="border p-2 rounded">
          <input type="text" id="new-activity" placeholder="ชื่อกิจกรรม" class="border p-2 rounded">
      </div>
      <textarea id="bulk-names" rows="5" placeholder="วางรายชื่อที่นี่ (หนึ่งชื่อต่อหนึ่งบรรทัด)" class="w-full border p-2 rounded mb-4"></textarea>
      
      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 text-gray-500">ยกเลิก</button>
        <button onclick="processBulk()" class="px-4 py-2 bg-blue-600 text-white rounded">ตรวจสอบและบันทึก</button>
      </div>
    </div>
  </div>

  <script>
    // โหลดข้อมูลเมื่อเปิดหน้า
    window.onload = () => {
      loadStats();
      loadTable();
    };

    function loadStats() {
      google.script.run.withSuccessHandler(stats => {
        document.getElementById('stat-total').innerText = stats.total;
        document.getElementById('stat-missing').innerText = stats.missingFiles;
      }).getAdminDashboardStats();
    }

    function openImportModal() {
      document.getElementById('import-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('import-modal').classList.add('hidden');
    }

    function processBulk() {
      const names = document.getElementById('bulk-names').value.split('\n').filter(n => n.trim() !== "");
      const year = document.getElementById('new-year').value;
      const activity = document.getElementById('new-activity').value;

      if(!year || !activity || names.length === 0) {
        Swal.fire('กรุณากรอกข้อมูลให้ครบ');
        return;
      }

      const rows = names.map(name => ({ year, activity, name: name.trim(), role: 'เข้าร่วม', imageId: '' }));

      Swal.fire({
        title: 'ยืนยันการบันทึก?',
        text: `จำนวน ${rows.length} รายการ`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'บันทึกทันที'
      }).then((result) => {
        if (result.isConfirmed) {
          google.script.run.withSuccessHandler(msg => {
            Swal.fire('สำเร็จ', msg, 'success');
            closeModal();
            loadTable();
          }).bulkSaveCertificates(rows);
        }
      });
    }
    
    // ฟังก์ชันอื่นๆ เช่น loadTable, exportCSV จะใส่เพิ่มเติมในขั้นถัดไป
  </script>
</body>
</html>
