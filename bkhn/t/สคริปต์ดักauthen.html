<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ HR บุคลากร - BKHN Unified Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // ดึงข้อมูลจาก LocalStorage ที่หน้าหลักบันทึกไว้
        const token = localStorage.getItem('725743939413-tjnb3o2hi3t5e4snroaurotu6l04u9jp.apps.googleusercontent.com');
        const userDataStr = localStorage.getItem('bkhn_user');

        // หากไม่มี Token หรือข้อมูล User ให้เตะกลับไปหน้า Portal หลักทันที
        if (!token || !userDataStr) {
            alert("ปฏิเสธการเข้าถึง: กรุณาเข้าสู่ระบบผ่านหน้า BKHN Unified Portal ก่อน");
            // เปลี่ยน 'index.html' เป็น URL จริงของหน้า Portal หลัก
            window.location.replace("index.html"); 
        } else {
            // หากผ่านการตรวจสอบ ให้แปลงข้อมูล JSON กลับมาเป็น Object เพื่อนำไปใช้ต่อ
            window.currentUser = JSON.parse(userDataStr);
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        primary: '#0d9488', /* ใช้สี Teal เพื่อแยกความแตกต่างว่าเป็น Module HR */
                        dark: '#1a1a1a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased hidden" id="appBody">
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="bg-primary text-white p-2 rounded-lg">
                        <i class="fas fa-id-card text-xl"></i>
                    </div>
                    <span class="ml-3 font-bold text-lg text-gray-800">ระบบบริหารงานบุคคล (HR)</span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-500 hover:text-primary transition flex items-center text-sm font-medium">
                        <i class="fas fa-th mr-2"></i> กลับหน้า Portal หลัก
                    </a>
                    
                    <div class="h-6 w-px bg-gray-300"></div>

                    <div class="flex items-center space-x-3">
                        <img id="displayAvatar" src="" alt="Profile" class="w-8 h-8 rounded-full border border-gray-200">
                        <div class="flex flex-col">
                            <span id="displayName" class="text-sm font-semibold text-gray-700 leading-tight"></span>
                            <span class="text-xs text-green-600 font-medium leading-tight">ยืนยันตัวตนแล้ว</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">แดชบอร์ดบุคลากร</h1>
                <p class="text-gray-500">ยินดีต้อนรับกลับมา, <span id="welcomeName" class="font-medium text-primary"></span></p>
            </div>
            <button class="bg-primary hover:bg-teal-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm transition">
                <i class="fas fa-plus mr-2"></i> เพิ่มข้อมูลบุคลากร
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="p-4 bg-teal-50 text-teal-600 rounded-full mr-4"><i class="fas fa-user-tie fa-2x"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">จำนวนครูและบุคลากร</p>
                    <p class="text-2xl font-bold text-gray-800">42 <span class="text-sm font-normal text-gray-500">คน</span></p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="p-4 bg-yellow-50 text-yellow-600 rounded-full mr-4"><i class="fas fa-envelope-open-text fa-2x"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">คำร้องลางานรออนุมัติ</p>
                    <p class="text-2xl font-bold text-gray-800">3 <span class="text-sm font-normal text-gray-500">รายการ</span></p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="p-4 bg-blue-50 text-blue-600 rounded-full mr-4"><i class="fas fa-calendar-check fa-2x"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">มาปฏิบัติงานวันนี้</p>
                    <p class="text-2xl font-bold text-gray-800">39 <span class="text-sm font-normal text-gray-500">คน</span></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // เมื่อโครงสร้าง HTML โหลดเสร็จ ให้นำข้อมูล User มาแสดงผล
        document.addEventListener("DOMContentLoaded", function() {
            if (window.currentUser) {
                // อัปเดตข้อมูลบน Navbar
                document.getElementById('displayName').innerText = window.currentUser.name;
                document.getElementById('displayAvatar').src = window.currentUser.picture;
                
                // อัปเดตคำทักทาย
                document.getElementById('welcomeName').innerText = window.currentUser.given_name || window.currentUser.name;

                // แสดงหน้าเว็บ (เอา class hidden ออก)
                document.getElementById('appBody').classList.remove('hidden');
            }
        });

        /* ตัวอย่างวิธีการแนบ Token ไปกับ API ยิงเข้า Backend ของ Module HR 
        
        async function fetchHRData() {
            const token = localStorage.getItem('bkhn_access_token');
            try {

                    }
                });
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }
        */
    </script>
</body>
</html>
