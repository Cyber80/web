<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วิทยาศาสตร์ประถมศึกษา | โรงเรียนบ้านเขาหัวนา</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --forest:   #1B4332;
    --forest2:  #2D6A4F;
    --leaf:     #52B788;
    --lime:     #95D5B2;
    --sky:      #48CAE4;
    --sun:      #F4A261;
    --cream:    #F8F5EE;
    --bark:     #6B4226;
    --header-h: 80px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 1000;
    background: var(--forest);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    gap: 20px;
  }

  /* leaf-vein decoration */
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        105deg,
        transparent,
        transparent 60px,
        rgba(82,183,136,0.07) 60px,
        rgba(82,183,136,0.07) 61px
      );
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .brand-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--leaf), var(--lime));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 12px rgba(82,183,136,0.4);
    flex-shrink: 0;
  }

  .brand-text { line-height: 1.2; }
  .brand-title {
    font-family: 'Mitr', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.3px;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--lime);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ─── NAV ─── */
  nav {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: nowrap;
  }

  .nav-btn {
    position: relative;
    padding: 9px 20px;
    border: none;
    border-radius: 10px;
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
    color: var(--lime);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    letter-spacing: 0.4px;
  }

  .nav-btn:hover {
    background: rgba(82,183,136,0.18);
    color: #fff;
    border-color: rgba(82,183,136,0.4);
    transform: translateY(-1px);
  }

  .nav-btn.active {
    background: linear-gradient(135deg, var(--leaf), var(--forest2));
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 14px rgba(82,183,136,0.45);
    transform: translateY(-1px);
  }

  .nav-btn .grade-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* grade colors */
  .dot-home { background: var(--sun); }
  .dot-p4   { background: var(--sky); }
  .dot-p5   { background: #a29bfe; }
  .dot-p6   { background: var(--sun); }

  /* ─── CONTENT FRAME ─── */
  .frame-wrapper {
    margin-top: var(--header-h);
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #content-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    transition: opacity 0.2s ease;
  }

  #content-frame.loading { opacity: 0; }

  /* loading overlay */
  .frame-loader {
    position: absolute;
    inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .frame-loader.show { opacity: 1; pointer-events: auto; }

  .loader-ring {
    width: 48px; height: 48px;
    border: 4px solid rgba(82,183,136,0.2);
    border-top-color: var(--leaf);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a class="brand" href="#" onclick="navigate('p0.html','home'); return false;">
    <div class="brand-icon">🌿</div>
    <div class="brand-text">
      <div class="brand-title">วิทยาศาสตร์ประถมศึกษา</div>
      <div class="brand-sub">โรงเรียนบ้านเขาหัวนา</div>
    </div>
  </a>

  <nav>
    <button class="nav-btn active" id="btn-home" onclick="navigate('p0.html','home')">
      <span class="grade-dot dot-home"></span>หน้าหลัก
    </button>
    <button class="nav-btn" id="btn-p4" onclick="navigate('p4.html','p4')">
      <span class="grade-dot dot-p4"></span>ป.4
    </button>
    <button class="nav-btn" id="btn-p5" onclick="navigate('p5.html','p5')">
      <span class="grade-dot dot-p5"></span>ป.5
    </button>
    <button class="nav-btn" id="btn-p6" onclick="navigate('p6.html','p6')">
      <span class="grade-dot dot-p6"></span>ป.6
    </button>
  </nav>
</header>

<div class="frame-wrapper">
  <div class="frame-loader" id="loader">
    <div class="loader-ring"></div>
  </div>
  <iframe id="content-frame" src="p0.html" title="เนื้อหา"></iframe>
</div>

<script>
  const buttons = {
    home: document.getElementById('btn-home'),
    p4:   document.getElementById('btn-p4'),
    p5:   document.getElementById('btn-p5'),
    p6:   document.getElementById('btn-p6'),
  };
  const frame  = document.getElementById('content-frame');
  const loader = document.getElementById('loader');

  function navigate(page, key) {
    // Update active button
    Object.values(buttons).forEach(b => b.classList.remove('active'));
    buttons[key].classList.add('active');

    // Show loader, swap src
    loader.classList.add('show');
    frame.style.opacity = '0';
    frame.src = page;
  }

  frame.addEventListener('load', () => {
    loader.classList.remove('show');
    frame.style.opacity = '1';
  });
</script>
</body>
</html>
