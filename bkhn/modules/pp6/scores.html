<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>กรอกคะแนน ปพ.6</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e6de;
  --border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1917;--text2:#6b6860;--text3:#a8a49c;
  --accent:#1a6b3c;--accent2:#155730;--accent-bg:#eaf3ed;--accent-light:#d1e9da;
  --blue:#1a4a8a;--blue-bg:#eaf0f9;--blue-light:#cde0f5;
  --amber:#8a5a00;--amber-bg:#fef8ed;
  --red:#8a1a1a;--red-bg:#fdeaea;
  --green-score:#0d5c2e;--green-bg:#e8f5ee;
  --mono:'IBM Plex Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}

nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:600;font-size:15px;color:var(--text);margin-right:32px;display:flex;align-items:center;gap:8px}
.nav-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.nav-links{display:flex;gap:2px}
.nav-link{padding:6px 14px;border-radius:6px;font-size:14px;text-decoration:none;color:var(--text2);transition:all .15s}
.nav-link:hover{background:var(--surface2);color:var(--text)}
.nav-link.active{background:var(--accent-bg);color:var(--accent);font-weight:500}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar-group{display:flex;align-items:center;gap:8px}
.toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
label.field-label{font-size:12px;font-family:var(--mono);color:var(--text2)}
select.toolbar-select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 10px;outline:none;cursor:pointer}
select.toolbar-select:focus{border-color:var(--accent)}

/* STATUS BAR */
.statusbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:16px;font-size:12px;font-family:var(--mono);color:var(--text2)}
.chip{background:var(--surface);border:1px solid var(--border);padding:2px 10px;border-radius:4px;color:var(--text)}
.chip.warn{background:var(--amber-bg);border-color:#f5d070;color:var(--amber)}
.chip.ok{background:var(--green-bg);border-color:var(--accent-light);color:var(--green-score)}

/* MAIN */
.main{padding:20px 24px 100px;overflow-x:auto}

/* SCORE TABLE */
.score-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)}

table{width:100%;border-collapse:collapse;font-size:13px}
thead tr:first-child th{background:#1a1917;color:#f0efe9;font-family:var(--mono);font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:8px 10px;text-align:center;white-space:nowrap}
thead tr:nth-child(2) th{background:var(--surface2);color:var(--text2);font-family:var(--mono);font-size:10px;padding:6px 8px;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap}
thead th.t1{background:rgba(26,74,138,.07)}
thead th.t2{background:rgba(26,107,60,.07)}

tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody tr.selected-row{background:var(--accent-bg)}

td{padding:4px 6px;vertical-align:middle}
td.num{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:center;width:32px}
td.name-cell{min-width:160px;max-width:220px}
td.name-cell input{font-size:13px;background:transparent;border:none;width:100%;outline:none;color:var(--text);padding:4px 2px}
td.name-cell input:focus{background:var(--surface);border-bottom:1px solid var(--accent)}

/* Score cell */
td.score-cell{width:52px;padding:3px 4px}
td.score-cell.t1{background:rgba(26,74,138,.03)}
td.score-cell.t2{background:rgba(26,107,60,.03)}
td.score-cell input{
  width:100%;background:transparent;border:1px solid transparent;border-radius:5px;
  font-family:var(--mono);font-size:13px;text-align:center;padding:4px 2px;
  outline:none;color:var(--text);transition:all .1s
}
td.score-cell input:focus{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,107,60,.1)}
td.score-cell input.over{color:var(--red);background:var(--red-bg)}
td.score-cell input.paste-highlight{animation:flashPaste .4s ease}

/* Computed cells */
td.computed{font-family:var(--mono);font-size:12px;text-align:center;padding:4px 6px;font-weight:500}
td.t1-sum{background:rgba(26,74,138,.06);color:var(--blue)}
td.t2-sum{background:rgba(26,107,60,.06);color:var(--green-score)}
td.total-sum{background:#1a1917;color:#f0efe9;font-weight:600;font-size:13px}

/* Grade badge */
.grade-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:12px;font-weight:600;min-width:32px;text-align:center}
.g-4{background:#d1e9da;color:#0d5c2e}
.g-35{background:#e0edd5;color:#2d5a11}
.g-3{background:#e8f5ee;color:#1a6b3c}
.g-25{background:#eaf0f9;color:#1a4a8a}
.g-2{background:#cde0f5;color:#1a4a8a}
.g-15{background:#fff3cd;color:#8a5a00}
.g-1{background:#fde8b5;color:#8a5a00}
.g-0{background:#fdeaea;color:#8a1a1a}

@keyframes flashPaste{0%{background:#fef8b0}100%{background:transparent}}

/* PASTE ZONE */
.paste-zone{border:2px dashed var(--border2);border-radius:10px;padding:32px;text-align:center;color:var(--text3);font-size:14px;margin-bottom:20px;transition:all .2s;cursor:pointer}
.paste-zone:hover,.paste-zone.dragover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.paste-zone .big{font-size:28px;display:block;margin-bottom:8px}
.paste-zone .hint{font-size:12px;font-family:var(--mono);margin-top:6px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.save-bar-left{font-size:12px;font-family:var(--mono);color:var(--text2)}

#toast{position:fixed;bottom:70px;right:24px;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{background:var(--accent);color:#fff}
#toast.error{background:var(--red-bg);color:var(--red);border:1px solid #f5c0c0}
#toast.info{background:var(--surface);color:var(--text);border:1px solid var(--border)}

.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><div class="nav-dot"></div>ระบบ ปพ.6</div>
  <div class="nav-links">
    <a class="nav-link" href="config.html">ตั้งค่า</a>
    <a class="nav-link active" href="scores.html">กรอกคะแนน</a>
    <a class="nav-link" href="pp6.html">พิมพ์ ปพ.6</a>
  </div>
</nav>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-group">
    <label class="field-label">ชั้น</label>
    <select class="toolbar-select" id="sel-class" onchange="onClassChange()">
      <option value="">-- เลือกชั้น --</option>
    </select>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label class="field-label">วิชา</label>
    <select class="toolbar-select" id="sel-subject" onchange="onSubjectChange()">
      <option value="">-- เลือกวิชา --</option>
    </select>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label class="field-label">เทอม</label>
    <select class="toolbar-select" id="sel-semester">
      <option value="both">ทั้งปี (เทอม 1+2)</option>
      <option value="1">เทอม 1</option>
      <option value="2">เทอม 2</option>
    </select>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="btn btn-outline btn-sm" onclick="loadScores()">โหลดจาก Sheets</button>
    <button class="btn btn-outline btn-sm" onclick="clearScores()">ล้างคะแนน</button>
  </div>
</div>

<div class="statusbar" id="statusbar">
  <span>เลือกชั้นและวิชาเพื่อเริ่มกรอกคะแนน</span>
</div>

<div class="main" id="main">
  <div class="paste-zone" id="paste-zone" onclick="document.getElementById('paste-input').focus()">
    <span class="big">📋</span>
    <div>คลิกที่นี่ แล้ว <strong>Ctrl+V</strong> เพื่อวางข้อมูลจาก Excel</div>
    <div class="hint">วางได้ทั้ง column หรือ range — ตรวจสอบตัวอย่างด้านล่างก่อนวาง</div>
    <textarea id="paste-input" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px" onpaste="handlePaste(event)"></textarea>
  </div>
  <div id="table-wrap"></div>
</div>

<div class="save-bar">
  <div class="save-bar-left" id="save-label">—</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-primary" id="save-btn" onclick="saveScores()">
      บันทึกลง Sheets
    </button>
  </div>
</div>
<div id="toast"></div>

<script>
const CFG_KEY='pp6_config';
const SCORES_KEY='pp6_scores';
let cfg={};
let scores={};// key: classKey_subjectCode => [{no,name,t1:[],t2:[]}]
let currentClass='';
let currentSubject=null;

function getConfig(){
  const s=localStorage.getItem(CFG_KEY);
  cfg = s ? JSON.parse(s) : {teachers:[],subjects:[],academicYear:'2568',currentSemester:'1'};
}
function getScores(){
  const s=localStorage.getItem(SCORES_KEY);
  scores = s ? JSON.parse(s) : {};
}
function saveScoresLocal(){
  localStorage.setItem(SCORES_KEY,JSON.stringify(scores));
}

function scoreKey(){ return currentClass+'__'+currentSubject.code; }

// ── Init dropdowns ──
function initDropdowns(){
  const sc=document.getElementById('sel-class');
  sc.innerHTML='<option value="">-- เลือกชั้น --</option>';
  (cfg.teachers||[]).forEach(t=>{
    const k=t.grade+'-'+t.room;
    const opt=document.createElement('option');
    opt.value=k; opt.textContent=t.grade+'/'+t.room+' ('+t.teacher+')';
    sc.appendChild(opt);
  });
  const ss=document.getElementById('sel-subject');
  ss.innerHTML='<option value="">-- เลือกวิชา --</option>';
  (cfg.subjects||[]).forEach((s,i)=>{
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=s.code+' '+s.name;
    ss.appendChild(opt);
  });
}

function onClassChange(){
  currentClass=document.getElementById('sel-class').value;
  if(currentSubject) renderTable();
}
function onSubjectChange(){
  const idx=document.getElementById('sel-subject').value;
  if(idx==='') { currentSubject=null; document.getElementById('table-wrap').innerHTML=''; return; }
  currentSubject={...cfg.subjects[+idx], idx:+idx};
  if(currentClass) renderTable();
}

// ── Ensure rows ──
function ensureRows(){
  const k=scoreKey();
  if(!scores[k]){
    scores[k]=Array.from({length:30},(_,i)=>({no:i+1,name:'',t1:Array(currentSubject.midCount+1).fill(''),t2:Array(currentSubject.midCount+1).fill('')}));
  }
  // extend if midCount changed
  scores[k].forEach(r=>{
    const need=currentSubject.midCount+1;
    while(r.t1.length<need) r.t1.push('');
    while(r.t2.length<need) r.t2.push('');
  });
}

// ── Render ──
function renderTable(){
  if(!currentClass||!currentSubject) return;
  ensureRows();
  const k=scoreKey();
  const rows=scores[k];
  const s=currentSubject;
  const showSem=document.getElementById('sel-semester').value;
  const showT1=showSem==='both'||showSem==='1';
  const showT2=showSem==='both'||showSem==='2';

  // header
  let midT1='', midT2='';
  for(let i=0;i<s.midCount;i++){
    midT1+=`<th class="t1">ก${i+1}<br><span style="font-weight:400;opacity:.7">/${s.midScore}</span></th>`;
    midT2+=`<th class="t2">ก${i+1}<br><span style="font-weight:400;opacity:.7">/${s.midScore}</span></th>`;
  }

  let head1='<th rowspan="2" style="min-width:32px">ที่</th><th rowspan="2" style="min-width:160px;text-align:left;padding-left:10px">ชื่อ-นามสกุล</th>';
  let head2='';
  if(showT1){
    head1+=`<th colspan="${s.midCount+2}" class="t1">เทอม 1 (${s.midCount*s.midScore+s.finalScore} คะแนน)</th>`;
    head2+=midT1+`<th class="t1">ปลาย<br><span style="font-weight:400;opacity:.7">/${s.finalScore}</span></th><th class="t1">รวมT1</th>`;
  }
  if(showT2){
    head1+=`<th colspan="${s.midCount+2}" class="t2">เทอม 2 (${s.midCount*s.midScore+s.finalScore} คะแนน)</th>`;
    head2+=midT2+`<th class="t2">ปลาย<br><span style="font-weight:400;opacity:.7">/${s.finalScore}</span></th><th class="t2">รวมT2</th>`;
  }
  if(showT1&&showT2) head1+='<th rowspan="2">รวมปี<br>/100</th><th rowspan="2">เกรด</th>';

  // body
  const tbody=rows.map((r,ri)=>{
    let cells='';
    if(showT1){
      for(let i=0;i<s.midCount;i++){
        cells+=`<td class="score-cell t1"><input type="number" min="0" max="${s.midScore}" id="t1m${ri}_${i}" value="${r.t1[i]}" oninput="onScore(${ri},'t1',${i},this)"></td>`;
      }
      cells+=`<td class="score-cell t1"><input type="number" min="0" max="${s.finalScore}" id="t1f${ri}" value="${r.t1[s.midCount]}" oninput="onScore(${ri},'t1',${s.midCount},this)"></td>`;
      cells+=`<td class="computed t1-sum" id="sum-t1-${ri}">${calcSum(r.t1,s)}</td>`;
    }
    if(showT2){
      for(let i=0;i<s.midCount;i++){
        cells+=`<td class="score-cell t2"><input type="number" min="0" max="${s.midScore}" id="t2m${ri}_${i}" value="${r.t2[i]}" oninput="onScore(${ri},'t2',${i},this)"></td>`;
      }
      cells+=`<td class="score-cell t2"><input type="number" min="0" max="${s.finalScore}" id="t2f${ri}" value="${r.t2[s.midCount]}" oninput="onScore(${ri},'t2',${s.midCount},this)"></td>`;
      cells+=`<td class="computed t2-sum" id="sum-t2-${ri}">${calcSum(r.t2,s)}</td>`;
    }
    let totalCell='', gradeCell='';
    if(showT1&&showT2){
      const t1=calcSumNum(r.t1,s), t2=calcSumNum(r.t2,s);
      const tot = (t1!==null&&t2!==null) ? t1+t2 : '';
      const g = tot!=='' ? getGrade(tot) : '';
      totalCell=`<td class="computed total-sum" id="tot-${ri}">${tot}</td>`;
      gradeCell=`<td class="computed" id="grade-${ri}">${g ? '<span class="grade-badge '+gradeCls(g)+'">'+g+'</span>' : ''}</td>`;
    }
    return `<tr id="row-${ri}">
      <td class="num">${r.no}</td>
      <td class="name-cell"><input type="text" value="${esc(r.name)}" placeholder="ชื่อ-นามสกุล" oninput="scores['${k}'][${ri}].name=this.value;saveScoresLocal();updateStatus()"></td>
      ${cells}${totalCell}${gradeCell}
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML=`
    <div class="score-wrap">
      <table>
        <thead><tr>${head1}</tr><tr>${head2}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;

  updateStatus();
  setupKeyNav();
}

function calcSum(arr,s){
  const n=calcSumNum(arr,s);
  return n!==null ? n : '';
}
function calcSumNum(arr,s){
  if(!arr||arr.every(v=>v===''||v===null||v===undefined)) return null;
  return arr.reduce((a,v)=>a+(v===''||v===null?0:+v),0);
}
function getGrade(pct){
  if(pct>=80)return'4'; if(pct>=75)return'3.5'; if(pct>=70)return'3';
  if(pct>=65)return'2.5'; if(pct>=60)return'2'; if(pct>=55)return'1.5';
  if(pct>=50)return'1'; return'0';
}
function gradeCls(g){
  const m={'4':'g-4','3.5':'g-35','3':'g-3','2.5':'g-25','2':'g-2','1.5':'g-15','1':'g-1','0':'g-0'};
  return m[g]||'';
}

function onScore(ri,term,col,input){
  const k=scoreKey();
  const val=input.value;
  scores[k][ri][term][col]=val;
  const s=currentSubject;
  const maxV = col<s.midCount ? s.midScore : s.finalScore;
  input.classList.toggle('over', val!==''&&+val>maxV);
  // update sums
  const r=scores[k][ri];
  const t1n=calcSumNum(r.t1,s), t2n=calcSumNum(r.t2,s);
  const t1el=document.getElementById('sum-t1-'+ri);
  const t2el=document.getElementById('sum-t2-'+ri);
  const totel=document.getElementById('tot-'+ri);
  const gradeel=document.getElementById('grade-'+ri);
  if(t1el) t1el.textContent=t1n!==null?t1n:'';
  if(t2el) t2el.textContent=t2n!==null?t2n:'';
  if(totel){
    const tot=(t1n!==null&&t2n!==null)?t1n+t2n:'';
    totel.textContent=tot;
    if(gradeel){
      const g=tot!==''?getGrade(tot):'';
      gradeel.innerHTML=g?`<span class="grade-badge ${gradeCls(g)}">${g}</span>`:'';
    }
  }
  saveScoresLocal();
  updateStatus();
}

function updateStatus(){
  if(!currentClass||!currentSubject){document.getElementById('statusbar').innerHTML='<span>เลือกชั้นและวิชาเพื่อเริ่มกรอกคะแนน</span>';return;}
  const k=scoreKey(); const rows=scores[k]||[];
  const filled=rows.filter(r=>r.t1.some(v=>v!=='')||r.t2.some(v=>v!=='')).length;
  const named=rows.filter(r=>r.name.trim()).length;
  const s=currentSubject;
  const term=s.midCount*s.midScore+s.finalScore;
  document.getElementById('statusbar').innerHTML=`
    <span class="chip">${currentClass}</span>
    <span class="chip">${s.code} ${s.name}</span>
    <span>มีชื่อ <span class="chip ok">${named}</span> คน</span>
    <span>กรอกแล้ว <span class="chip ${filled?'ok':'warn'}">${filled}</span> ราย</span>
    <span style="margin-left:auto;color:var(--text3)">คะแนนต่อเทอม ${term} | ทั้งปี ${term*2}</span>`;
  document.getElementById('save-label').textContent=`${currentClass} / ${s.name} — ${filled}/${rows.length} ราย`;
}

// ── Paste handler ──
function handlePaste(e){
  e.preventDefault();
  const text=e.clipboardData.getData('text');
  if(!text||!currentSubject||!currentClass){toast('เลือกชั้นและวิชาก่อนวางข้อมูล','error');return;}
  const lines=text.trim().split(/\r?\n/);
  const k=scoreKey();
  ensureRows();
  let pastedCount=0;
  lines.forEach((line,li)=>{
    if(li>=scores[k].length)return;
    const cols=line.split('\t');
    const s=currentSubject;
    // detect format: if 1 col = names only, else full row
    if(cols.length===1){
      // just names
      scores[k][li].name=cols[0].trim();
    } else {
      // try to map: name?, t1_g1..gN, t1_final, t2_g1..gN, t2_final
      let ci=0;
      // check if first col is number (no), skip
      if(cols[ci]&&!isNaN(+cols[ci].trim())&&+cols[ci].trim()<200) ci++;
      // name
      if(cols[ci]&&isNaN(+cols[ci].trim().replace(/[^\d.]/g,''))){
        scores[k][li].name=cols[ci].trim(); ci++;
      }
      // t1 scores
      for(let i=0;i<=s.midCount&&ci<cols.length;i++,ci++){
        scores[k][li].t1[i]=cols[ci].trim()===''?'':cols[ci].trim();
      }
      // t2 scores
      for(let i=0;i<=s.midCount&&ci<cols.length;i++,ci++){
        scores[k][li].t2[i]=cols[ci].trim()===''?'':cols[ci].trim();
      }
    }
    pastedCount++;
  });
  saveScoresLocal();
  renderTable();
  toast(`วางข้อมูล ${pastedCount} แถวสำเร็จ ✓`,'success');
}

// ── Keyboard nav ──
function setupKeyNav(){
  document.querySelectorAll('td.score-cell input').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      const id=inp.id; if(!id)return;
      const cell=inp.closest('td'); const row=inp.closest('tr');
      if(e.key==='Tab'||e.key==='Enter'||e.key==='ArrowRight'){
        e.preventDefault();
        const inputs=[...document.querySelectorAll('td.score-cell input')];
        const idx=inputs.indexOf(inp);
        if(idx<inputs.length-1) inputs[idx+1].focus();
      } else if(e.key==='ArrowLeft'){
        e.preventDefault();
        const inputs=[...document.querySelectorAll('td.score-cell input')];
        const idx=inputs.indexOf(inp);
        if(idx>0) inputs[idx-1].focus();
      } else if(e.key==='ArrowDown'){
        e.preventDefault();
        const allRows=[...document.querySelectorAll('tbody tr')];
        const ri=allRows.indexOf(row);
        if(ri<allRows.length-1){
          const nextRow=allRows[ri+1];
          const sameCol=[...nextRow.querySelectorAll('td.score-cell input')];
          const thisCols=[...row.querySelectorAll('td.score-cell input')];
          const ci=thisCols.indexOf(inp);
          if(sameCol[ci]) sameCol[ci].focus();
        }
      } else if(e.key==='ArrowUp'){
        e.preventDefault();
        const allRows=[...document.querySelectorAll('tbody tr')];
        const ri=allRows.indexOf(row);
        if(ri>0){
          const prevRow=allRows[ri-1];
          const sameCol=[...prevRow.querySelectorAll('td.score-cell input')];
          const thisCols=[...row.querySelectorAll('td.score-cell input')];
          const ci=thisCols.indexOf(inp);
          if(sameCol[ci]) sameCol[ci].focus();
        }
      }
    });
  });
}

// ── Load from API ──
async function loadScores(){
  if(!cfg.apiUrl){toast('กรุณาตั้งค่า API URL ก่อน','error');return;}
  if(!currentClass||!currentSubject){toast('เลือกชั้นและวิชาก่อน','error');return;}
  const btn=document.getElementById('save-btn');
  const [grade,room]=currentClass.split('-');
  try{
    const h={'Content-Type':'application/json'};
    if(cfg.apiKey) h['Authorization']='Bearer '+cfg.apiKey;
    const url=`${cfg.apiUrl}/scores?sheetId=${encodeURIComponent(cfg.sheetId)}&grade=${encodeURIComponent(grade)}&room=${encodeURIComponent(room)}&subject=${encodeURIComponent(currentSubject.code)}&year=${cfg.academicYear}`;
    const r=await fetch(url,{headers:h});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.rows){
      const k=scoreKey();
      scores[k]=data.rows;
      saveScoresLocal();
      renderTable();
      toast('โหลดข้อมูลจาก Sheets สำเร็จ','success');
    }
  }catch(err){toast('โหลดไม่สำเร็จ: '+err.message,'error');}
}

// ── Save to API ──
async function saveScores(){
  if(!cfg.apiUrl){toast('กรุณาตั้งค่า API URL ก่อน','error');return;}
  if(!currentClass||!currentSubject){toast('เลือกชั้นและวิชาก่อน','error');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> กำลังบันทึก...';
  const [grade,room]=currentClass.split('-');
  const k=scoreKey();
  const payload={
    sheetId:cfg.sheetId, year:cfg.academicYear,
    grade, room,
    subjectCode:currentSubject.code, subjectName:currentSubject.name,
    midCount:currentSubject.midCount, midScore:currentSubject.midScore,
    finalScore:currentSubject.finalScore,
    rows:scores[k]||[]
  };
  try{
    const h={'Content-Type':'application/json'};
    if(cfg.apiKey) h['Authorization']='Bearer '+cfg.apiKey;
    const r=await fetch(cfg.apiUrl+'/scores',{method:'POST',headers:h,body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    toast('บันทึกลง Sheets สำเร็จ ✓','success');
  }catch(err){toast('บันทึกไม่สำเร็จ: '+err.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='บันทึกลง Sheets';}
}

// ── Clear ──
function clearScores(){
  if(!currentClass||!currentSubject)return;
  if(!confirm('ล้างคะแนนทั้งหมดในวิชานี้?'))return;
  const k=scoreKey();
  scores[k]=null;
  ensureRows();
  renderTable();
  toast('ล้างคะแนนแล้ว','info');
}

// ── Export CSV ──
function exportCSV(){
  if(!currentClass||!currentSubject)return;
  const k=scoreKey(); const rows=scores[k]||[]; const s=currentSubject;
  let hdr=['ที่','ชื่อ-นามสกุล'];
  for(let i=0;i<s.midCount;i++) hdr.push(`T1_ก${i+1}`);
  hdr.push('T1_ปลาย','รวมT1');
  for(let i=0;i<s.midCount;i++) hdr.push(`T2_ก${i+1}`);
  hdr.push('T2_ปลาย','รวมT2','รวมปี','เกรด');
  const lines=[hdr.join(',')];
  rows.forEach(r=>{
    const t1=calcSumNum(r.t1,s), t2=calcSumNum(r.t2,s);
    const tot=(t1!==null&&t2!==null)?t1+t2:'';
    const g=tot!==''?getGrade(tot):'';
    const cols=[r.no,`"${r.name}"`,...r.t1,t1!==null?t1:'',...r.t2,t2!==null?t2:'',tot,g];
    lines.push(cols.join(','));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${s.code}_${currentClass}.csv`;
  a.click(); toast('Export CSV สำเร็จ','success');
}

function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(window._t); window._t=setTimeout(()=>el.classList.remove('show'),2800);
}
