<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดเก็บข้อมูลศิลปหัตถกรรม ครั้งที่ 73</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* กำหนดฟอนต์หลักและขนาดพื้นฐานที่ใหญ่ขึ้น */
        * { font-family: 'Sarabun', sans-serif; font-size: 16px; } 

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* ปรับเนื้อหาในตารางให้ตัวใหญ่และชิดบน */
        td { 
            vertical-align: top; 
            padding: 14px 8px !important; 
            font-size: 16px !important; /* ขนาดตัวอักษรเนื้อหาตาราง */
            line-height: 1.6;
        }

        /* ปรับหัวตารางให้เด่นชัด */
        th { 
            cursor: pointer; 
            user-select: none; 
            white-space: nowrap; 
            transition: 0.2s; 
            font-size: 16px !important; 
            font-weight: 700 !important;
            padding: 16px 8px !important;
        }
        th:hover { color: #4f46e5; background-color: #f1f5f9; }

        /* ปรับขนาดตัวอักษรในฟอร์มแก้ไข (Modal) ให้ใหญ่พิเศษเพื่อความชัดเจน */
        input, select, textarea { 
            font-size: 18px !important; 
            padding: 12px !important; 
            border-radius: 12px !important;
        }

        /* ปรับหัวข้อ (Label) ในฟอร์ม */
        label { 
            font-size: 15px !important; 
            font-weight: 600; 
            margin-bottom: 6px; 
            display: block;
            color: #475569;
        }

        /* ขยายความกว้างคอลัมน์ชื่อนักเรียนรองรับฟอนต์ใหญ่ */
        .col-name { 
            min-width: 250px; 
            max-width: 350px; 
            white-space: normal; 
            word-wrap: break-word; 
        }

        /* ปรับขนาด Badge สถานะให้ใหญ่ขึ้นเล็กน้อย */
        .status-badge {
            font-size: 12px !important;
            padding: 6px 12px !important;
        }

        /* ขยายขนาดปุ่มกดต่างๆ */
        button {
            font-size: 15px !important;
        }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">

<div id="app" class="h-full flex flex-col overflow-hidden">
    <header class="bg-gradient-to-r from-indigo-800 to-blue-600 text-white px-6 py-4 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl md:text-2xl font-bold">ศิลปหัตถกรรมนักเรียน ครั้งที่ 73</h1>
            <p class="text-indigo-100 text-sm">โรงเรียนบ้านเขาหัวนา | <span id="adminStatusText" class="font-bold">โหมดบุคคลทั่วไป</span></p>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden md:flex gap-2 font-bold text-xs">
                <div class="bg-white/10 px-3 py-1 rounded">ทั้งหมด: <span id="countAll">0</span></div>
                <div class="bg-rose-500/30 px-3 py-1 rounded border border-rose-400">ค้าง: <span id="countPending">0</span></div>
            </div>
            <button onclick="loginAdmin()" id="btnLogin" class="bg-white text-indigo-700 px-4 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-indigo-50 transition">แอดมิน</button>
            <button onclick="logoutAdmin()" id="btnLogout" class="hidden bg-rose-500 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-rose-600 transition">ออกจากระบบ</button>
        </div>
    </header>

    <div class="bg-white border-b px-6 py-3 flex flex-col md:flex-row justify-between gap-3 shadow-sm">
        <div class="flex flex-1 gap-2">
            <div class="relative flex-1 max-w-md">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="runSearch()" placeholder="ค้นหาชื่อรายการ, นักเรียน..." class="w-full pl-10 pr-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <a href="https://drive.google.com/drive/folders/1Nad7KZe3Hj3ABCcLwEGanCJFA1vFmVP7?usp=sharing" target="_blank" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm flex items-center transition font-medium">
                <i class="fab fa-google-drive me-2 text-emerald-600"></i> Drive
            </a>
        </div>
        <div class="flex gap-2">
            <button onclick="openModal()" class="admin-only hidden bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md transition">เพิ่มข้อมูล</button>
            <button onclick="exportCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md transition">Export CSV</button>
        </div>
    </div>

    <div class="flex-1 overflow-auto p-4 md:p-6 custom-scrollbar">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-[13px] text-left border-collapse" id="mainTable">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase">
                    <tr>
                        <th class="px-4 py-4 text-center" onclick="sortTable(1)">ลำดับ</th>
                        <th class="px-4 py-4" onclick="sortTable(2)">รหัส</th>
                        <th class="px-4 py-4" onclick="sortTable(3)">รายการกิจกรรม</th>
                        <th class="px-4 py-4" onclick="sortTable(4)">ระดับชั้น</th>
                        <th class="px-4 py-4 col-name" onclick="sortTable(7)">ชื่อ - สกุล</th>
                        <th class="px-4 py-4" onclick="sortTable(8)">ผลการแข่งขัน</th>
                        <th class="px-4 py-4 text-center" onclick="sortTable(9)">สถานะ(นร.)</th>
                        <th class="px-4 py-4 text-center admin-only hidden">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="text-center py-20 text-slate-400 font-bold">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
        <div class="px-6 py-4 bg-indigo-50 border-b flex justify-between items-center">
            <h3 id="modalTitle" class="font-bold text-lg text-indigo-900">บันทึกข้อมูล</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-rose-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form id="entryForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="fRowNum">
            <div class="grid grid-cols-2 gap-3 md:col-span-2 text-sm">
                <div><label class="font-bold text-slate-500 mb-1 block">ลำดับ</label><input type="number" id="f1" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
                <div><label class="font-bold text-slate-500 mb-1 block">รหัสรายการ</label><input type="text" id="f2" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
            </div>
            <div class="md:col-span-2 text-sm"><label class="font-bold text-slate-500 mb-1 block">กิจกรรม</label><input type="text" id="f3" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" required></div>
            <div class="text-sm"><label class="font-bold text-slate-500 mb-1 block">ระดับชั้น</label><input type="text" id="f4" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
            <div class="text-sm"><label class="font-bold text-slate-500 mb-1 block">กลุ่มสาระ</label><input type="text" id="f6" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
            <div class="md:col-span-2 text-sm"><label class="font-bold text-slate-500 mb-1 block">ชื่อ - สกุล ผู้เข้าแข่งขัน</label><textarea id="f7" rows="2" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></textarea></div>
            <div class="md:col-span-2 text-sm"><label class="font-bold text-slate-500 mb-1 block">ผลการแข่งขัน</label><input type="text" id="f8" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
            <div class="text-sm"><label class="font-bold text-slate-500 mb-1 block">สถานะเกียรติบัตร(นร.)</label>
                <select id="f9" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="ยังไม่ได้รับ">ยังไม่ได้รับ</option><option value="ได้รับแล้ว">ได้รับแล้ว</option>
                </select>
            </div>
            <div class="text-sm"><label class="font-bold text-slate-500 mb-1 block">หมายเหตุ</label><input type="text" id="f11" class="w-full border rounded-xl p-2.5 bg-slate-50 border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
            <div class="md:col-span-2 flex justify-end gap-3 mt-4">
                <button type="button" onclick="closeModal()" class="px-6 py-2 text-slate-400 font-bold hover:text-slate-600">ยกเลิก</button>
                <button type="submit" id="btnSubmit" class="bg-indigo-600 text-white px-10 py-2.5 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition shadow-indigo-200">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 🚨 สำคัญ: นำ URL ที่ได้จากการ Deploy ใหม่มาวางตรงนี้
   //const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8VkzCceae_GBTjCBJjoXhddmTjxToQCYzL79bQslBqwRgdHL-tyCMLQbf1xQfO_-W/exec";//

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLWP1-13ydXCYqByjkBbcCn9ez3D4cgjCi1NLWFP2lYWulTnNrGph8sfqu5y61of26/exec";
    let allData = [];
    let sortOrders = {};

    window.onload = () => {
        if (localStorage.getItem('admin_73_persist') === 'true') applyAdminUI(true);
        loadData();
    };

    // ปรับปรุงฟังก์ชัน loadData ให้แสดง Error ชัดเจน
    async function loadData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-20 text-slate-400 font-bold"><i class="fas fa-sync fa-spin me-2"></i>กำลังดึงข้อมูล...</td></tr>';
        try {
            const resp = await fetch(`${WEB_APP_URL}?action=getData`);
            const textResult = await resp.text(); // อ่านเป็น Text ก่อนเพื่อดัก Error

            try {
                const res = JSON.parse(textResult);
                
                if (res.error) {
                    throw new Error(res.error);
                }

                allData = res.rows || [];
                updateStats();
                renderTable(allData);

            } catch (jsonError) {
                console.error("ไม่ใช่ JSON ตอบกลับมา:", textResult);
                throw new Error("ข้อมูลตอบกลับผิดพลาด (ตรวจสอบการ Deploy เป็น Anyone หรือลองใช้ Gmail ธรรมดาสร้าง API)");
            }

        } catch (e) {
            console.error("Fetch Error:", e);
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-20 text-rose-500 font-bold bg-rose-50">
                <i class="fas fa-exclamation-triangle text-2xl mb-2"></i><br>
                ไม่สามารถโหลดข้อมูลได้<br>
                <span class="text-sm font-normal text-slate-600">สาเหตุ: ${e.message}</span>
            </td></tr>`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const admin = localStorage.getItem('admin_73_persist') === 'true';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-20 text-slate-400">ไม่พบข้อมูล</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(row => {
            const done = row.c9 === 'ได้รับแล้ว';
            return `
            <tr class="table-row-hover transition-colors border-b border-slate-50">
                <td class="px-4 py-3 text-center text-slate-400 font-bold">${row.c1 || '-'}</td>
                <td class="px-4 py-3"><span class="bg-indigo-50 text-indigo-500 px-2 py-1 rounded-md text-[10px] font-bold">${row.c2 || '-'}</span></td>
                <td class="px-4 py-3 font-bold text-slate-500 leading-tight">${row.c3}</td>
                <td class="px-4 py-3 text-slate-500 text-[11px] font-medium">${row.c4}</td>
                <td class="px-4 py-3 col-name"><strong class="text-slate-500">${row.c7 || ''}</strong></td>
                <td class="px-4 py-3 text-slate-500 text-[11px]">${row.c8}</td>
                <td class="px-4 py-3 text-center">
                    <span onclick="${admin ? `fastToggle(${row.rowNum}, '${row.c9}')` : ''}" 
                          class="inline-block px-3 py-1 rounded-full text-[10px] font-bold ${admin ? 'cursor-pointer hover:scale-105 transition-transform shadow-sm' : ''} ${done ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                        ${row.c9}
                    </span>
                </td>
                <td class="px-4 py-3 admin-only ${admin ? '' : 'hidden'} text-center">
                    <div class="flex gap-3 justify-center text-lg">
                        <button onclick='editRow(${JSON.stringify(row).replace(/'/g, "&apos;")})' class="text-blue-500 hover:text-blue-700 transition"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow(${row.rowNum})" class="text-rose-500 hover:text-rose-700 transition"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    function updateStats() {
        const total = allData.length;
        const received = allData.filter(r => r.c9 === 'ได้รับแล้ว').length;
        document.getElementById('countAll').innerText = total;
        // Check if countReceived exists, if not, skip it (it wasn't in your original HTML header, but countPending was)
        if(document.getElementById('countReceived')) document.getElementById('countReceived').innerText = received;
        document.getElementById('countPending').innerText = total - received;
    }

    // --- Actions ---
    async function fastToggle(rowNum, current) {
        const next = current === 'ได้รับแล้ว' ? 'ยังไม่ได้รับ' : 'ได้รับแล้ว';
        const idx = allData.findIndex(r => r.rowNum == rowNum);
        if(idx !== -1) {
            allData[idx].c9 = next;
            renderTable(allData);
            updateStats();
        }
        await fetch(`${WEB_APP_URL}?action=updateField&rowNum=${rowNum}&colName=c9&newValue=${encodeURIComponent(next)}`);
    }

    document.getElementById('entryForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "กำลังบันทึก...";
        
        const rowNum = document.getElementById('fRowNum').value;
        const action = rowNum ? 'updateField' : 'addRow';
        const params = new URLSearchParams({ action, rowNum });
        ['1','2','3','4','6','7','8','9','11'].forEach(i => {
            params.append('c'+i, document.getElementById('f'+i).value);
        });
        
        await fetch(`${WEB_APP_URL}?${params.toString()}`);
        closeModal(); loadData();
        btn.disabled = false; btn.innerText = "บันทึกข้อมูล";
    };

    async function deleteRow(num) {
        if(confirm("❗ คุณต้องการลบรายการนี้ใช่หรือไม่?")) {
            await fetch(`${WEB_APP_URL}?action=deleteRow&rowNum=${num}`);
            loadData();
        }
    }

    function editRow(row) {
        openModal();
        document.getElementById('modalTitle').innerText = "แก้ไขข้อมูล";
        document.getElementById('fRowNum').value = row.rowNum;
        ['1','2','3','4','6','7','8','9','11'].forEach(i => {
            document.getElementById('f'+i).value = row['c'+i] || "";
        });
    }

    // --- Admin System ---
    function loginAdmin() {
        if(prompt("Password:") === "admin1234") {
            localStorage.setItem('admin_73_persist', 'true');
            applyAdminUI(true);
            renderTable(allData);
        }
    }
    function logoutAdmin() {
        localStorage.removeItem('admin_73_persist');
        location.reload();
    }
    function applyAdminUI(admin) {
        document.getElementById('adminStatusText').innerText = admin ? "ผู้ดูแลระบบ (Admin Mode)" : "โหมดบุคคลทั่วไป";
        document.getElementById('btnLogin').classList.toggle('hidden', admin);
        document.getElementById('btnLogout').classList.toggle('hidden', !admin);
        document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !admin));
    }

    // --- Helpers ---
    function openModal() {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
        document.getElementById('modalTitle').innerText = "เพิ่มรายการใหม่";
        document.getElementById('entryForm').reset();
        document.getElementById('fRowNum').value = "";
    }
    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }
    function sortTable(n) {
        const key = 'c' + n;
        sortOrders[key] = !sortOrders[key];
        allData.sort((a, b) => {
            let v1 = String(a[key] || "");
            let v2 = String(b[key] || "");
            const res = v1.localeCompare(v2, 'th', {numeric: true});
            return sortOrders[key] ? res : -res;
        });
        renderTable(allData);
    }
    function runSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        renderTable(allData.filter(r => JSON.stringify(r).toLowerCase().includes(val)));
    }
    function exportCSV() {
        let csv = ["ลำดับ,รหัส,กิจกรรม,ระดับชั้น,ชื่อ-สกุล,ผลการแข่งขัน,สถานะ"];
        allData.forEach(r => csv.push(`"${r.c1}","${r.c2}","${r.c3}","${r.c4}","${r.c7}","${r.c8}","${r.c9}"`));
        const BOM = '\uFEFF';
        const blob = new Blob([BOM + csv.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "data_ศิลหัตถกรรม_73.csv";
        link.click();
    }
</script>
</body>
</html>
